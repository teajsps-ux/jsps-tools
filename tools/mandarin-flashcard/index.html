                        setDecks(prev => [...prev, ...missingDecks]);
                        setSetupSelectedDecks(prev => [...prev, ...missingDecks.map(deck => deck.id)]);
                        showModal({ title: "載入完成", content: `已加入 ${missingDecks.length} 個翰林 114 一上單元。`, showCancel: false, onConfirm: closeModal });
                    })
                    .catch(() => showModal({ title: "載入失敗", content: "找不到預設題庫檔，請確認 seed_翰林114一上.json 是否存在。", showCancel: false, onConfirm: closeModal }));
            };

            const startQuiz = (deckId) => {
                const deck = decks.find(d => d.id === deckId);
                if (!deck || deck.cards.length === 0) { showModal({ title: "無法開始", content: "這個單元還沒有卡片喔！", showCancel: false, onConfirm: closeModal }); return; }
                let cardsToPlay = [...deck.cards];
                cardsToPlay.sort(() => Math.random() - 0.5);
                setCurrentDeckId(deckId);
                setQuizCards(cardsToPlay);
                setCurrentCardIndex(0);
                setIsFlipped(false);
                setScore({ correct: 0, wrong: 0, wrongCards: [] });
                setView('QUIZ');
            };
            
            const startQuizRetry = (cards) => {
                let cardsToPlay = [...cards];
                cardsToPlay.sort(() => Math.random() - 0.5);
                setQuizCards(cardsToPlay);
                setCurrentCardIndex(0);
                setIsFlipped(false);
                setScore({ correct: 0, wrong: 0, wrongCards: [] });
                setView('QUIZ');
            };

            useEffect(() => {
                if (view === 'QUIZ' && quizCards.length > 0 && !isFlipped) {
                    const timer = setTimeout(() => speakText(quizCards[currentCardIndex].word), 600);
                    return () => clearTimeout(timer);
                }
            }, [view, currentCardIndex, isFlipped, quizCards]);
            
            const handleCardClick = () => !isFlipped && setIsFlipped(true);
            const handleAnswer = (isCorrect) => {
                if (isCorrect) { setScore(prev => ({ ...prev, correct: prev.correct + 1 })); nextCard(); }
                else {
                    setScore(prev => ({ ...prev, wrong: prev.wrong + 1, wrongCards: [...prev.wrongCards, quizCards[currentCardIndex]] }));
                    setIsSpeaking(true);
                    speakText(quizCards[currentCardIndex].definition, () => { setIsSpeaking(false); nextCard(); });
                }
            };
            const nextCard = () => {
                if (currentCardIndex < quizCards.length - 1) { setIsFlipped(false); setCurrentCardIndex(prev => prev + 1); }
                else setView('RESULT');
            };
            const playDefinition = (e) => { e.stopPropagation(); speakText(quizCards[currentCardIndex].definition); };

            const getCleanDisplayWord = (word) => {
                const cleaned = String(word || '').replace(BOPOMOFO_REGEX, '').replace(/[^\u3400-\u9fffA-Za-z0-9]/g, '');
                return cleaned || String(word || '').replace(BOPOMOFO_REGEX, '').trim();
            };

            const renderVerticalWord = (word) => {
                const displayWord = getCleanDisplayWord(word);
                return displayWord.split('').map((char, index) => <span key={`${char}-${index}`}>{char}</span>);
            };

            const getBattleCellWord = (word) => {
                const displayWord = getCleanDisplayWord(word);
                const limit = gridSide >= 9 ? 2 : gridSide >= 7 ? 3 : gridSide >= 5 ? 4 : 8;
                return displayWord.length > limit ? `${displayWord.slice(0, limit)}…` : displayWord;
            };

            const getBattleCellTextStyle = () => {
                if (gridSide >= 9) return { fontSize: 'clamp(0.55rem, 2.1vw, 0.78rem)', WebkitLineClamp: 2 };
                if (gridSide >= 7) return { fontSize: 'clamp(0.65rem, 2.5vw, 0.9rem)', WebkitLineClamp: 2 };
                if (gridSide >= 5) return { fontSize: 'clamp(0.78rem, 3vw, 1.05rem)', WebkitLineClamp: 2 };
                return { fontSize: 'clamp(1rem, 4vw, 1.45rem)', WebkitLineClamp: 3 };
            };

            // --- Battle Logic V9 ---
            const openGameCenter = () => {
                if (decks.length === 0) { showModal({ title: "無法開始", content: "請先新增一些單元吧！", showCancel: false, onConfirm: closeModal }); return; }
                setView('BATTLE_SETUP');
            };
            const updatePlayerConfig = (index, field, value) => {
                const newConfig = [...playerConfig];
                newConfig[index] = { ...newConfig[index], [field]: value };
                setPlayerConfig(newConfig);
            };
            const toggleDeckSelection = (deckId) => { setSetupSelectedDecks(prev => prev.includes(deckId) ? prev.filter(id => id !== deckId) : [...prev, deckId]); };
            const initBattle = (mode, side, pCount) => {
                if (setupSelectedDecks.length === 0) { showModal({ title: "無法開始", content: "請至少勾選一個單元！", showCancel: false, onConfirm: closeModal }); return; }
                const count = mode === 'TERRITORY_CHAOS' ? pCount : 2; 
                const currentPlayers = [];
                for(let i=0; i<count; i++) {
                    const cfg = playerConfig[i];
                    const colorData = COLOR_PALETTE[cfg.colorId];
                    currentPlayers.push({ id: i, name: cfg.name.trim() || colorData.name + '隊', color: colorData });
                }
                setActivePlayers(currentPlayers);
                let allCards = [];
                decks.forEach(d => {
                    if (setupSelectedDecks.includes(d.id)) {
                        const meta = parseDeckMeta(d);
                        allCards.push(...d.cards.map(card => ({ ...card, category: meta.category })));
                    }
                });
                if (allCards.length === 0) { showModal({ title: "無法開始", content: "選定的單元裡沒有題目！", showCancel: false, onConfirm: closeModal }); return; }
                const totalCells = side * side;
                let gridCardsPool = [];
                while(gridCardsPool.length < totalCells) { gridCardsPool.push(...allCards); }
                gridCardsPool.sort(() => Math.random() - 0.5);
                const gridCards = [];
                for(let i=0; i<totalCells; i++) { gridCards.push({ ...gridCardsPool[i], gridId: `g-${i}`, owner: null }); }
                gridCards.sort(() => Math.random() - 0.5);
                setGameMode(mode); setGridSide(side); setBattleGrid(gridCards); setPlayerCount(count);
                setCurrentPlayerIndex(0); setBattleWinner(null); setWinnerDetails(null); setSelectedGridIndex(null); setIsFlipped(false);
                setView('BATTLE_GAME');
            };
            const shuffleGrid = (currentGrid) => {
                const newGrid = [...currentGrid];
                for (let i = newGrid.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newGrid[i], newGrid[j]] = [newGrid[j], newGrid[i]];
                }
                return newGrid;
            };
            const checkLineWinner = (grid, side) => {
                const check = (indices) => {
                    const firstOwner = grid[indices[0]].owner;
                    if (firstOwner === null) return null; 
                    for (let i = 1; i < indices.length; i++) { if (grid[indices[i]].owner !== firstOwner) return null; }
                    return firstOwner;
                };
                for (let r = 0; r < side; r++) { const w = check(Array.from({length:side}, (_,i) => r*side+i)); if (w !== null) return w; }
                for (let c = 0; c < side; c++) { const w = check(Array.from({length:side}, (_,i) => i*side+c)); if (w !== null) return w; }
                const w1 = check(Array.from({length:side}, (_,i) => i*side+i)); if (w1 !== null) return w1;
                const w2 = check(Array.from({length:side}, (_,i) => i*side+(side-1-i))); if (w2 !== null) return w2;
                return null;
            };
            const checkTerritoryWinner = (grid) => {
                const counts = {}; let full = true;
                grid.forEach(c => { if (c.owner === null) full = false; else counts[c.owner] = (counts[c.owner] || 0) + 1; });
                if (!full) return null; 
                let max = -1; let winner = null;
                Object.keys(counts).forEach(p => { if (counts[p] > max) { max = counts[p]; winner = parseInt(p); } else if (counts[p] === max) { winner = 'DRAW'; } });
                return { winner, counts };
            };
            const handleBattleCardClick = (index) => {
                if (battleWinner !== null || battleGrid[index].owner !== null) return; 
                setSelectedGridIndex(index); setIsFlipped(false); speakText(battleGrid[index].word);
            };
            const handleBattleAnswer = (isCorrect) => {
                let newGrid = [...battleGrid];
                const cardIndex = selectedGridIndex;
                const pIndex = currentPlayerIndex;
                const nextP = (pIndex + 1) % playerCount;
                if (gameMode === 'STREAK_STATIC' || gameMode === 'STREAK_CHAOS') {
                    if (isCorrect) {
                        newGrid[cardIndex].owner = pIndex;
                        const w = checkLineWinner(newGrid, gridSide);
                        if (w !== null) { setBattleGrid(newGrid); setBattleWinner(w); setSelectedGridIndex(null); return; }
                    } else {
                        newGrid[cardIndex].owner = nextP; 
                        const w = checkLineWinner(newGrid, gridSide);
                        if (w !== null) { setBattleGrid(newGrid); setBattleWinner(w); setSelectedGridIndex(null); return; }
                        setCurrentPlayerIndex(nextP);
                    }
                    if (gameMode === 'STREAK_CHAOS') newGrid = shuffleGrid(newGrid);
                } else if (gameMode === 'CONNECT_STATIC') {
                    if (isCorrect) newGrid[cardIndex].owner = pIndex;
                    const w = checkLineWinner(newGrid, gridSide);
                    if (w !== null) { setBattleGrid(newGrid); setBattleWinner(w); setSelectedGridIndex(null); return; }
                    setCurrentPlayerIndex(nextP);
                } else if (gameMode === 'TERRITORY_CHAOS') {
                    if (isCorrect) newGrid[cardIndex].owner = pIndex;
                    setCurrentPlayerIndex(nextP);
                    newGrid = shuffleGrid(newGrid);
                    const res = checkTerritoryWinner(newGrid);
                    if (res) { setBattleGrid(newGrid); setBattleWinner(res.winner); setWinnerDetails(res.counts); setSelectedGridIndex(null); return; }
                }
                setBattleGrid(newGrid); setSelectedGridIndex(null);
            };
            const onBattleWrong = (e) => {
                e.stopPropagation(); if (isSpeaking) return; setIsSpeaking(true);
                speakText(battleGrid[selectedGridIndex].definition, () => { setIsSpeaking(false); handleBattleAnswer(false); });
            };
            const onBattleCorrect = (e) => { e.stopPropagation(); if (isSpeaking) return; handleBattleAnswer(true); };
            const playBattleDefinition = (e) => { e.stopPropagation(); if (selectedGridIndex !== null) speakText(battleGrid[selectedGridIndex].definition); };

            // --- Views ---
            const renderHome = () => {
                const sortedDecks = [...decks].sort(sortDecksByCourse);
                const publishers = ['全部', ...new Set([...PUBLISHER_OPTIONS, ...sortedDecks.map(d => parseDeckMeta(d).publisher)])];
                const books = ['全部', ...new Set([...BOOK_OPTIONS, ...sortedDecks
                    .filter(d => filterPublisher === '全部' || parseDeckMeta(d).publisher === filterPublisher)
                    .map(d => parseDeckMeta(d).book)])];
                const lessons = ['全部', ...new Set(sortedDecks
                    .filter(d => {
                        const meta = parseDeckMeta(d);
                        return (filterPublisher === '全部' || meta.publisher === filterPublisher) &&
                            (filterBook === '全部' || meta.book === filterBook) &&
                            (filterCategory === '全部' || meta.category === filterCategory);
                    })
                    .map(d => parseDeckMeta(d).lessonNo)
                    .filter(Boolean)
                    .sort((a, b) => a - b)
                    .map(String))];
                const visibleDecks = sortedDecks.filter(deck => {
                    const meta = parseDeckMeta(deck);
                    return (filterPublisher === '全部' || meta.publisher === filterPublisher) &&
                        (filterBook === '全部' || meta.book === filterBook) &&
                        (filterLesson === '全部' || String(meta.lessonNo) === filterLesson) &&
                        (filterCategory === '全部' || meta.category === filterCategory);
                });

                return (
                <div className="max-w-5xl mx-auto p-4">
                    {/* 右上角：背景圖庫 */}
                    {!parentMode && (
                    <div className="relative flex justify-end pt-3">
                        <button onClick={() => setBgPanelOpen(open => !open)} className="anime-btn bg-white px-3 py-2 text-sm font-bold text-gray-800 cursor-pointer flex items-center gap-2">
                            <LucideIcon name="Image" size={18}/> 背景 {bgMode === 'auto' ? `(${autoTermName})` : ''}
                        </button>
                        {bgPanelOpen && (
                            <div className="absolute right-0 top-14 z-30 w-[min(92vw,520px)] glass-box p-4 text-left shadow-xl">
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><LucideIcon name="Images" size={20}/> 背景圖庫</h3>
                                    <button onClick={() => setBgPanelOpen(false)} className="text-gray-500 hover:text-gray-900"><LucideIcon name="X" size={20}/></button>
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4">
                                    {[
                                        ['auto', `24節氣自動（${autoTermName}）`],
                                        ['manual', '手動選圖'],
                                        ['slideshow', '圖片輪播'],
                                        ['sakura', '櫻花動畫'],
                                        ['snow', '雪花動畫'],
                                        ['stars', '星空動畫'],
                                        ['maple', '楓葉動畫'],
                                        ['ocean', '海浪動畫']
                                    ].map(([value, label]) => (
                                        <button key={value} onClick={() => setBgMode(value)} className={`rounded-lg border-2 px-2 py-2 text-sm font-bold ${bgMode === value ? 'bg-sky-100 border-sky-400 text-sky-900' : 'bg-white border-gray-200 text-gray-700'}`}>
                                            {label}
                                        </button>
                                    ))}
                                </div>
                                {bgMode === 'slideshow' && (
                                    <div className="mb-4 rounded-lg border bg-white/80 p-3">
                                        <label className="block text-xs font-bold text-gray-500 mb-1">輪播秒數</label>
                                        <input type="number" min="3" max="120" value={slideshowSeconds} onChange={(e) => setSlideshowSeconds(e.target.value)} className="w-28 border-2 border-gray-200 rounded-lg p-2 font-bold" />
                                    </div>
                                )}
                                <div className="flex flex-wrap items-center gap-2 mb-3">
                                    <label className="anime-btn bg-emerald-100 hover:bg-emerald-200 border-emerald-300 px-3 py-2 text-sm font-bold cursor-pointer flex items-center gap-2">
                                        <LucideIcon name="Upload" size={16}/> 新增背景
                                        <input type="file" accept="image/*" multiple className="hidden" onChange={addBackgroundFiles} />
                                    </label>
                                    <span className="text-xs font-bold text-gray-500">自訂圖會存在這台裝置的瀏覽器裡。</span>
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[45vh] overflow-auto pr-1">
                                    {allBackgrounds.map(bg => (
                                        <div key={bg.id} className={`rounded-xl border-2 bg-white p-2 ${selectedBgId === bg.id ? 'border-sky-500' : 'border-gray-200'}`}>
                                            <button onClick={() => { setSelectedBgId(bg.id); setBgMode('manual'); }} className="block w-full text-left">
                                                <div className="bg-thumb rounded-lg border border-gray-200" style={{ backgroundImage: `url("${bg.url}")` }}></div>

                                            <div><span className="bg-slate-100 text-slate-700 px-2 py-1 rounded text-sm font-bold mb-2 inline-block">解釋</span><div className="font-bpmf quiz-definition text-3xl font-bold text-gray-800 leading-snug">{currentCard.definition}</div></div>
                                            <div className="bg-gray-50/80 p-4 border-2 border-dashed border-gray-300 rounded-xl transform -rotate-1 mt-4">
                                                <span className="text-gray-500 text-xs font-bold mb-1 block">例句</span><div className="font-bpmf quiz-example text-xl text-gray-700 leading-relaxed font-medium">{currentCard.example}</div>
                                            </div>
                                        </div>
                                        <div className="mt-4 grid grid-cols-2 gap-4">
                                            <button onClick={(e) => { e.stopPropagation(); handleAnswer(false); }} disabled={isSpeaking} className="anime-btn bg-red-100 border-red-400 py-3 flex flex-col items-center justify-center hover:bg-red-200 text-red-800 disabled:opacity-50"><LucideIcon name="XCircle" size={32} className="mb-1"/><span className="font-bold">還不熟 (X)</span></button>
                                            <button onClick={(e) => { e.stopPropagation(); handleAnswer(true); }} disabled={isSpeaking} className="anime-btn bg-emerald-100 border-emerald-400 py-3 flex flex-col items-center justify-center hover:bg-emerald-200 text-emerald-800 disabled:opacity-50"><LucideIcon name="CheckCircle" size={32} className="mb-1"/><span className="font-bold">記住了 (O)</span></button>
                                        </div>
                                        <button onClick={playDefinition} className="absolute top-4 right-4 p-2 rounded-full bg-yellow-100 border-2 border-yellow-400 hover:bg-yellow-200 text-yellow-800"><LucideIcon name="Volume2" size={24}/></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="mt-8"><button onClick={() => setView('HOME')} className="text-gray-300 font-bold underline hover:text-white">放棄測驗，回到首頁</button></div>
                    </div>
                );
            };

            const renderResult = () => {
                const percentage = Math.round((score.correct / (score.correct + score.wrong)) * 100) || 0;
                let comment = "繼續加油！"; if (percentage === 100) comment = "太神啦！完全制霸！"; else if (percentage >= 80) comment = "很棒喔！只差一點點！";
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-box p-8 max-w-2xl w-full text-center">
                            <h2 className="text-4xl font-bold mb-2 text-gray-800">測驗結果</h2>
                            <p className="text-xl text-slate-600 mb-6 font-bold">{comment}</p>
                            <div className="flex justify-center items-center gap-8 mb-8">
                                <div className="text-center"><div className="text-6xl font-bold text-emerald-500">{score.correct}</div><div className="text-gray-500 font-bold">答對</div></div>
                                <div className="text-6xl text-gray-300">/</div>
                                <div className="text-center"><div className="text-6xl font-bold text-red-500">{score.wrong}</div><div className="text-gray-500 font-bold">需要複習</div></div>
                            </div>
                            {score.wrongCards.length > 0 && <div className="mb-8 text-left"><h3 className="font-bold text-xl mb-3 border-b-2 border-red-200 pb-1 text-red-700">錯誤單字複習：</h3><div className="flex flex-wrap gap-2">{score.wrongCards.map(c => (<span key={c.id} className="bg-red-50 border border-red-200 px-3 py-1 rounded text-lg text-gray-700 font-bold">{c.word}</span>))}</div></div>}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <button onClick={() => setView('HOME')} className="anime-btn bg-gray-100 hover:bg-gray-200 py-3 flex justify-center items-center gap-2"><LucideIcon name="Home" size={20}/> 回首頁</button>
                                {score.wrongCards.length > 0 && <button onClick={() => startQuizRetry(score.wrongCards)} className="anime-btn bg-orange-100 border-orange-300 hover:bg-orange-200 py-3 flex justify-center items-center gap-2 text-orange-700"><LucideIcon name="RotateCcw" size={20}/> 複習錯誤</button>}
                                <button onClick={() => startQuiz(currentDeckId)} className="anime-btn bg-emerald-100 border-emerald-300 hover:bg-emerald-200 py-3 flex justify-center items-center gap-2 text-emerald-700"><LucideIcon name="RotateCcw" size={20}/> 全部重考</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBattleSetup = () => {
                const activePlayerCount = setupMode === 'TERRITORY_CHAOS' ? setupPlayerCount : 2;
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="glass-box p-6 max-w-5xl w-full">
                            <h2 className="text-4xl font-bold mb-6 text-center border-b-4 border-gray-200 pb-4 text-gray-800">遊戲大廳</h2>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="space-y-6">
                                    <div>
                                        <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-gray-700"><span className="bg-slate-700 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">1</span> 選擇模式：</h3>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={() => setSetupMode('STREAK_STATIC')} className={`p-3 border-2 rounded-xl font-bold text-left flex items-center gap-3 transition-all ${setupMode==='STREAK_STATIC'?'bg-sky-100 border-sky-400 shadow-md':'bg-white/50 border-gray-200 hover:bg-white'}`}>
                                                <div className="text-2xl">⚡</div><div><div className="text-lg">先答先贏 (靜態)</div><div className="text-xs text-gray-500">答對繼續｜連線獲勝｜位置固定</div></div>
                                            </button>
                                            <button onClick={() => setSetupMode('CONNECT_STATIC')} className={`p-3 border-2 rounded-xl font-bold text-left flex items-center gap-3 transition-all ${setupMode==='CONNECT_STATIC'?'bg-violet-100 border-violet-400 shadow-md':'bg-white/50 border-gray-200 hover:bg-white'}`}>
                                                <div className="text-2xl">🔗</div><div><div className="text-lg">先連線贏 (靜態)</div><div className="text-xs text-gray-500">輪流答題｜連線獲勝｜位置固定</div></div>
                                            </button>
                                            <button onClick={() => setSetupMode('STREAK_CHAOS')} className={`p-3 border-2 rounded-xl font-bold text-left flex items-center gap-3 transition-all ${setupMode==='STREAK_CHAOS'?'bg-red-100 border-red-400 shadow-md':'bg-white/50 border-gray-200 hover:bg-white'}`}>
                                                <div className="text-2xl">🌀</div><div><div className="text-lg">先答先贏 (亂數)</div><div className="text-xs text-gray-500">連勝規則｜每回亂數大風吹</div></div>
                                            </button>
                                            <button onClick={() => setSetupMode('TERRITORY_CHAOS')} className={`p-3 border-2 rounded-xl font-bold text-left flex items-center gap-3 transition-all ${setupMode==='TERRITORY_CHAOS'?'bg-emerald-100 border-emerald-400 shadow-md':'bg-white/50 border-gray-200 hover:bg-white'}`}>
                                                <div className="text-2xl">🏰</div><div><div className="text-lg">多人佔地 (亂數)</div><div className="text-xs text-gray-500">佔領最多者勝｜每回亂數大風吹</div></div>
                                            </button>
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-gray-700"><span className="bg-slate-700 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">2</span> 設定宮格 (N x N)：</h3>
                                        <div className="bg-white/60 p-3 rounded-xl border border-gray-200">
                                            <div className="grid grid-cols-4 sm:grid-cols-8 gap-2 mb-3">
                                                {[3,4,5,6,7,8,9,10].map(size => (
                                                    <button key={size} onClick={() => setSetupSide(size)} className={`rounded-lg border-2 px-2 py-2 text-base font-bold ${setupSide === size ? 'bg-sky-100 border-sky-400 text-sky-900' : 'bg-white border-gray-200 text-gray-700'}`}>
                                                        {size}x{size}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="3" max="10" step="1" value={setupSide} onChange={(e)=>setSetupSide(parseInt(e.target.value, 10))} className="w-full accent-sky-400" />
                                                <div className="text-center w-24 shrink-0"><span className="block text-2xl font-bold text-gray-700">{setupSide}x{setupSide}</span><span className="text-xs text-gray-500 font-bold">{setupSide*setupSide}格</span></div>
                                            </div>
                                        </div>
                                    </div>
                                    {setupMode === 'TERRITORY_CHAOS' && (
                                        <div>
                                            <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-gray-700"><span className="bg-slate-700 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">3</span> 遊玩人數：</h3>
                                            <div className="flex items-center gap-4 bg-white/60 p-3 rounded-xl border border-gray-200">
                                                <input type="range" min="2" max="6" value={setupPlayerCount} onChange={(e)=>setSetupPlayerCount(parseInt(e.target.value))} className="w-full h-4 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-emerald-400" />
                                                <span className="text-2xl font-bold w-20 text-center text-gray-700">{setupPlayerCount}人</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-gray-700"><span className="bg-slate-700 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">{setupMode==='TERRITORY_CHAOS'?'4':'3'}</span> 隊伍設定：</h3>
                                    <div className="bg-white/50 p-4 rounded-xl border border-gray-200 h-full max-h-[400px] overflow-y-auto custom-scroll">
                                        {Array.from({ length: activePlayerCount }).map((_, i) => (
                                            <div key={i} className="mb-4 last:mb-0">
                                                <label className="text-sm font-bold text-gray-600 mb-1 block">玩家 {i + 1}</label>
                                                <div className="flex gap-2">
                                                    <div className="relative group"><button className={`w-12 h-12 rounded-lg border-2 border-white shadow-sm ${COLOR_PALETTE[playerConfig[i].colorId].bg}`} onClick={() => updatePlayerConfig(i, 'colorId', (playerConfig[i].colorId + 1) % COLOR_PALETTE.length)} title="點擊更換顏色"></button></div>
                                                    <input type="text" value={playerConfig[i].name} onChange={(e) => updatePlayerConfig(i, 'name', e.target.value)} placeholder={`${COLOR_PALETTE[playerConfig[i].colorId].name}隊`} className="flex-1 border-2 border-gray-200 rounded-lg px-3 py-2 font-bold focus:border-sky-300 outline-none bg-white/80"/>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="text-xs text-gray-500 mt-4 text-center">* 點擊色塊可更換代表色</div>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-gray-700"><span className="bg-slate-700 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">{setupMode==='TERRITORY_CHAOS'?'5':'4'}</span> 選擇單元：</h3>
                                    <div className="bg-white/50 p-4 rounded-xl border border-gray-200 h-full max-h-[400px] overflow-y-auto custom-scroll">
                                        <div className="flex gap-2 mb-2">
                                            <button onClick={() => setSetupSelectedDecks(decks.map(d => d.id))} className="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300 text-gray-600">全選</button>
                                            <button onClick={() => setSetupSelectedDecks([])} className="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300 text-gray-600">全不選</button>
                                        </div>
                                        {[...decks].sort(sortDecksByCourse).map(deck => {
                                            const meta = parseDeckMeta(deck);
                                            const categoryInfo = getCategoryInfo(meta.category);
                                            return (
                                            <div key={deck.id} onClick={() => toggleDeckSelection(deck.id)} className={`flex items-center gap-3 p-2 rounded cursor-pointer mb-2 border-2 transition-all ${setupSelectedDecks.includes(deck.id) ? 'bg-yellow-50 border-yellow-300 shadow-sm' : 'bg-white/40 border-transparent hover:bg-white/80'}`}>
                                                <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${setupSelectedDecks.includes(deck.id) ? 'bg-yellow-400 border-yellow-500 text-white' : 'border-gray-300 bg-white'}`}>
                                                    {setupSelectedDecks.includes(deck.id) && <LucideIcon name="Check" size={14} />}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="font-bold text-sm truncate text-gray-700">{deck.name}</div>
                                                    <div className="text-xs text-gray-500">{meta.publisher} / {meta.book} / {meta.lessonNo ? `第 ${meta.lessonNo} 課` : '未分課'} / {categoryInfo.shortLabel} / {deck.cards.length} 張</div>
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8">
                                <button onClick={() => setView('HOME')} className="flex-1 anime-btn bg-gray-100 hover:bg-gray-200 py-3 font-bold text-xl text-gray-600">回首頁</button>
                                <button onClick={() => initBattle(setupMode, setupSide, activePlayerCount)} className="flex-[2] anime-btn bg-gradient-to-r from-yellow-200 to-orange-200 hover:from-yellow-300 hover:to-orange-300 border-orange-300 py-3 font-bold text-xl text-gray-700 shadow-lg">開始對戰！</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBattleGame = () => {
                const currentPlayer = activePlayers[currentPlayerIndex];
                const gridStyle = { display: 'grid', gridTemplateColumns: `repeat(${gridSide}, minmax(0, 1fr))`, gap: gridSide >= 8 ? '0.18rem' : gridSide > 6 ? '0.25rem' : '0.5rem' };
                const cellPadding = gridSide >= 8 ? 'p-0.5' : 'p-1';
                const cellTextStyle = getBattleCellTextStyle();
                const selectedBattleCard = selectedGridIndex !== null ? battleGrid[selectedGridIndex] : null;
                const battleWordLabel = selectedBattleCard?.category === 'idiom' ? '成語' : '詞語';
                return (
                    <div className="min-h-screen flex flex-col p-2 md:p-4">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-4 glass-box p-4 gap-4">
                            <div className="flex items-center gap-4">
                                <div className={`flex items-center gap-2 px-6 py-2 rounded-xl border-2 border-white shadow-md transition-all ${currentPlayer.color.bg} ${currentPlayer.color.text}`}>
                                    <span className="font-bold text-2xl drop-shadow-sm">輪到：{currentPlayer.name}</span>
                                </div>
                                {gameMode === 'STREAK_STATIC' && <span className="text-sm font-bold text-sky-600 bg-sky-100 px-2 py-1 rounded-lg">先答先贏(靜態)</span>}
                                {gameMode === 'CONNECT_STATIC' && <span className="text-sm font-bold text-violet-600 bg-violet-100 px-2 py-1 rounded-lg">先連線贏(靜態)</span>}
                                {gameMode === 'STREAK_CHAOS' && <span className="text-sm font-bold text-pink-600 bg-pink-100 px-2 py-1 rounded-lg">先答先贏(亂數)</span>}
                                {gameMode === 'TERRITORY_CHAOS' && <span className="text-sm font-bold text-emerald-600 bg-emerald-100 px-2 py-1 rounded-lg">多人佔地(亂數)</span>}
                            </div>
                            <button onClick={() => setView('BATTLE_SETUP')} className="text-gray-600 font-bold underline hover:text-gray-900">結束對戰</button>
                        </div>
                        <div className="flex-1 flex items-center justify-center overflow-auto p-2">
                            <div style={gridStyle} className="w-full max-w-[800px] aspect-square">
                                {battleGrid.map((cell, index) => {
                                    const owner = cell.owner !== null ? activePlayers[cell.owner] : null;
                                    const ownerColor = owner ? owner.color : null;
                                    return (
                                        <button key={`${cell.gridId}-${index}`} onClick={() => handleBattleCardClick(index)} disabled={cell.owner !== null || battleWinner !== null}
                                            className={`relative glass-box flex flex-col items-center justify-center ${cellPadding} text-center transition-all overflow-hidden min-w-0 ${ownerColor ? ownerColor.bg + ' ' + ownerColor.text + ' border-transparent' : 'hover:bg-white/90 border-white/50'}`}>
                                            {ownerColor ? (
                                                <div className="w-full h-full flex items-center justify-center p-1"><span className="battle-cell-word font-bold leading-tight drop-shadow-md" style={cellTextStyle}>{owner.name}</span></div>
                                            ) : (
                                                <span className="battle-cell-word font-bold leading-tight text-gray-700" style={cellTextStyle} title={getCleanDisplayWord(cell.word)}>{getBattleCellWord(cell.word)}</span>
                                            )}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        {selectedGridIndex !== null && (
                            <div className="fixed inset-0 bg-gray-800 bg-opacity-60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="relative w-full max-w-lg aspect-[3/4] perspective-1000" onClick={() => !isFlipped && setIsFlipped(true)}>
                                    <div className={`relative w-full h-full duration-500 transform-style-3d transition-transform ${isFlipped ? 'rotate-y-180' : ''}`}>
                                        <div className={`absolute w-full h-full backface-hidden ${isFlipped ? 'pointer-events-none' : 'pointer-events-auto'}`}>
                                            <div className={`glass-box w-full h-full flex flex-col items-center justify-center p-8 border-4 border-white ${currentPlayer.color.light}`}>
                                                <div className="text-2xl text-gray-500 absolute top-8 left-8">{battleWordLabel}</div>
                                                <div className="font-bpmf quiz-word vertical-card-word text-5xl md:text-6xl font-bold text-center mb-8 text-gray-800">{renderVerticalWord(selectedBattleCard.word)}</div>
                                                <div className="text-gray-500 animate-bounce font-bold">點擊翻牌看答案</div>
                                            </div>
                                        </div>
                                        <div className={`absolute w-full h-full backface-hidden rotate-y-180 ${isFlipped ? 'pointer-events-auto' : 'pointer-events-none'}`}>
                                            <div className="glass-box w-full h-full flex flex-col p-8 border-4 border-white bg-white/95 relative">
                                                <div className="flex-1 flex flex-col justify-center gap-6 overflow-y-auto no-scrollbar">
                                                    <div><span className="bg-slate-200 px-2 py-1 rounded text-sm font-bold mb-2 inline-block text-slate-700">解釋</span><div className="font-bpmf quiz-definition text-3xl font-bold text-gray-800 leading-snug">{battleGrid[selectedGridIndex].definition}</div></div>

                                                    {/* V9.1 FIX: Example Section */}
                                                    <div className="bg-gray-50/80 p-4 border-2 border-dashed border-gray-300 rounded-xl transform -rotate-1 mt-4">
                                                        <span className="text-gray-500 text-xs font-bold mb-1 block">例句</span>
                                                        <div className="font-bpmf quiz-example text-xl text-gray-700 leading-relaxed font-medium">{battleGrid[selectedGridIndex].example}</div>
                                                    </div>
                                                </div>
                                                <div className="mt-4 grid grid-cols-2 gap-4">
                                                    <button onClick={onBattleWrong} disabled={isSpeaking} className="anime-btn bg-gray-100 border-gray-400 py-3 flex flex-col items-center justify-center hover:bg-gray-200 disabled:opacity-50 text-gray-600"><span className="font-bold text-xl">答錯了</span></button>
                                                    <button onClick={onBattleCorrect} disabled={isSpeaking} className={`anime-btn py-3 flex flex-col items-center justify-center disabled:opacity-50 ${currentPlayer.color.light} border-gray-400 text-gray-800`}><span className="font-bold text-xl">答對了</span></button>
                                                </div>
                                                <button onClick={playBattleDefinition} className="absolute top-4 right-4 p-2 rounded-full bg-yellow-100 border-2 border-yellow-400 hover:bg-yellow-200 text-yellow-700"><LucideIcon name="Volume2" size={24}/></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {battleWinner !== null && (
                            <div className="fixed inset-0 bg-gray-800 bg-opacity-60 z-50 flex items-center justify-center p-4 backdrop-blur-md">
                                <div className="glass-box p-8 max-w-md w-full text-center animate-bounce-in">
                                    <div className="text-6xl mb-4">🏆</div>
                                    {battleWinner === 'DRAW' ? <h2 className="text-4xl font-bold mb-4 text-gray-700">平手！</h2> : <h2 className={`text-4xl font-bold mb-4 ${activePlayers[battleWinner].color.text.replace('white', 'gray-800')}`}>{activePlayers[battleWinner].name} 獲勝！</h2>}
                                    {winnerDetails && (
                                        <div className="my-6 text-left bg-white/60 p-4 rounded-xl border border-gray-200"><h4 className="font-bold mb-2 border-b border-gray-300 pb-1 text-gray-600">佔領統計：</h4>{Object.entries(winnerDetails).map(([pid, count]) => (<div key={pid} className="flex justify-between items-center mb-1"><span className="font-bold text-gray-700">{activePlayers[pid].name}</span><span className="font-bold text-gray-700">{count} 格</span></div>))}</div>
                                    )}
                                    <div className="flex flex-col gap-3 mt-6"><button onClick={() => initBattle(gameMode, gridSide, activePlayers.length)} className="anime-btn bg-emerald-200 hover:bg-emerald-300 border-emerald-400 py-3 font-bold text-gray-700">再玩一局</button><button onClick={() => setView('BATTLE_SETUP')} className="anime-btn bg-gray-100 hover:bg-gray-200 py-3 font-bold text-gray-600">回遊戲大廳</button></div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen selection:bg-slate-300 selection:text-slate-900">
                    {view === 'HOME' && renderHome()}
                    {view === 'EDIT' && renderEdit()}
                    {view === 'QUIZ' && renderQuiz()}
                    {view === 'RESULT' && renderResult()}
                    {view === 'BATTLE_SETUP' && renderBattleSetup()}
                    {view === 'BATTLE_GAME' && renderBattleGame()}
                    <Modal isOpen={modalConfig.isOpen} title={modalConfig.title} content={modalConfig.content} onConfirm={modalConfig.onConfirm} onCancel={modalConfig.onCancel} showConfirm={modalConfig.showConfirm} showCancel={modalConfig.showCancel} confirmText={modalConfig.confirmText} cancelText={modalConfig.cancelText} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
