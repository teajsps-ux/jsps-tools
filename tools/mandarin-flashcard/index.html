<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Bpmf Iansui (含注音的標楷風字型，給低年級閃卡用) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/bpmf-iansui/index.css">
    
    <style>
        /* --- 全域設定：字體與背景 --- */
        body {
            font-family: "BiaoKai", "DFKai-SB", "KaiTi", "Noto Serif TC", serif;
            background-color: #2c3e50;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            color: #2d3748;
            min-height: 100vh;
            transition: background 1.2s ease;
        }

        /* === 背景主題：圖片（保留原本 bg.jpg 用法） === */
        body.theme-image {
            background-image: var(--mandarin-bg-image, url('bg.jpg')), linear-gradient(135deg, #232526 0%, #414345 100%);
        }

        /* === 背景主題：櫻花飄落（春） === */
        body.theme-sakura {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
        }

        /* === 背景主題：雪花紛飛（冬） === */
        body.theme-snow {
            background: linear-gradient(180deg, #1a2e4a 0%, #34546c 100%);
        }

        /* === 背景主題：星空閃爍（夜晚） === */
        body.theme-stars {
            background: radial-gradient(ellipse at top, #1e1b4b 0%, #0f0f23 100%);
        }

        /* === 背景主題：楓葉飄動（秋） === */
        body.theme-maple {
            background: linear-gradient(135deg, #fff3e0 0%, #ffcc80 50%, #ff8a65 100%);
        }

        /* === 背景主題：海浪流動（夏） === */
        body.theme-ocean {
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 50%, #0077be 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }

        /* === 背景主題：彩虹漸層 === */
        body.theme-rainbow {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffd1ff, #c2e9fb, #a1c4fd, #d4fc79);
            background-size: 600% 600%;
            animation: gradientFlow 20s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* === 粒子層（櫻花/雪花/楓葉/星星） === */
        #particles-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            top: -10vh;
            user-select: none;
            will-change: transform, opacity;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
        }
        .particle-fall { animation: particle-fall linear infinite; }
        .particle-sway { animation: particle-sway linear infinite; }
        .particle-twinkle {
            top: auto;
            animation: particle-twinkle ease-in-out infinite;
        }
        .particle-rise {
            top: auto;
            animation: particle-rise linear infinite;
        }
        @keyframes particle-fall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
            8% { opacity: 0.85; }
            92% { opacity: 0.85; }
            100% { transform: translateY(110vh) translateX(30px); opacity: 0; }
        }
        @keyframes particle-sway {
            0% { transform: translateY(-10vh) translateX(0) rotate(0); opacity: 0; }
            8% { opacity: 0.9; }
            50% { transform: translateY(50vh) translateX(80px) rotate(180deg); }
            92% { opacity: 0.9; }
            100% { transform: translateY(110vh) translateX(-50px) rotate(360deg); opacity: 0; }
        }
        @keyframes particle-twinkle {
            0%, 100% { opacity: 0.25; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        @keyframes particle-rise {
            0% { transform: translateY(12vh) translateX(0) scale(0.65); opacity: 0; }
            10% { opacity: 0.75; }
            50% { transform: translateY(-45vh) translateX(36px) scale(1); }
            90% { opacity: 0.75; }
            100% { transform: translateY(-110vh) translateX(-28px) scale(1.25); opacity: 0; }
        }

        /* root 確保在粒子層之上 */
        #root { position: relative; z-index: 1; }

        .bg-thumb {
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
        }

        .battle-cell-word {
            max-width: 100%;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        /* === 字型：閃卡專用 Bpmf Iansui（內建注音） === */
        .font-bpmf {
            font-family: 'Bpmf Iansui', "BiaoKai", "DFKai-SB", "KaiTi", "Noto Serif TC", serif !important;
        }

        /* --- 翻牌動畫核心 --- */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        .vertical-card-word {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.18em;
            line-height: 1;
            letter-spacing: 0;
            max-height: 72%;
            max-width: 82%;
            overflow: hidden;
        }
        .vertical-card-word span {
            display: block;
        }

        .quiz-card-shell {
            max-height: min(74vh, 680px);
        }

        .quiz-card-face {
            border-radius: 16px;
        }

        /* --- 玻璃磨砂容器 --- */
        .glass-box {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        /* --- 按鈕風格 --- */
        .anime-btn {
            border: 2px solid #4a5568;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.15s ease;
            box-shadow: 3px 3px 0px 0px #2d3748;
        }
        .anime-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px #2d3748;
        }

        /* 隱藏 Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* === 響應式：手機 / 平板 === */
        @media (max-width: 640px) {
            .home-title { font-size: 2.25rem !important; letter-spacing: 0.1em !important; }
            .home-subtitle { font-size: 1rem !important; }
            .home-section-title { font-size: 1.5rem !important; padding-left: 0.75rem !important; }
            .home-actions { flex-wrap: wrap !important; gap: 0.5rem !important; justify-content: flex-end; }
            .home-actions button { padding: 0.4rem 0.7rem !important; font-size: 0.8rem !important; }
            .deck-card { padding: 1rem !important; }
            .deck-card-title { font-size: 1.25rem !important; margin-top: 4.5rem !important; }
            .quiz-card-shell { max-height: 66vh; }
            .quiz-card-face { padding: 1.25rem !important; }
            .vertical-card-word {
                gap: 0.08em;
                max-height: 68%;
                max-width: 90%;
                line-height: 1.12;
            }
            .quiz-word { font-size: clamp(2.4rem, 14vw, 4.1rem) !important; }
            .quiz-definition { font-size: clamp(1.3rem, 6vw, 2rem) !important; line-height: 1.42 !important; }
            .quiz-example { font-size: clamp(1rem, 4.5vw, 1.35rem) !important; line-height: 1.45 !important; }
            .battle-grid-cell { font-size: 0.7rem !important; }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            .home-title { font-size: 3.5rem !important; }
        }

        /* 觸控按鈕最小 44px（iOS 規範） */
        @media (max-width: 640px) {
            button, select, input[type="button"], input[type="submit"] {
                min-height: 40px;
            }
        }
    </style>
</head>
<body class="theme-image">
    <div id="particles-layer"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Shared Button Style Class ---
        const btnBase = "px-3 py-1.5 rounded-lg border-2 border-gray-600 flex items-center gap-1 shadow-[2px_2px_0px_0px_rgba(75,85,99,1)] text-sm font-bold transition-all active:translate-y-[2px] active:shadow-none bg-white hover:bg-gray-100 text-gray-800";

        // --- Lucide Icon Helper ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const lucideGlobal = window.lucide;
            if (!lucideGlobal || !lucideGlobal.icons) return null;
            const iconData = lucideGlobal.icons[name];
            if (!iconData) return null;
            const toCamelCase = (str) => str.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
            const convertAttrs = (rawAttrs) => {
                const newAttrs = {};
                for (const key in rawAttrs) {
                    const camelKey = key === 'class' ? 'className' : toCamelCase(key);
                    newAttrs[camelKey] = rawAttrs[key];
                }
                return newAttrs;
            };
            const renderIconNode = ([tag, attrs = {}, children = []], index) => React.createElement(
                tag,
                { ...convertAttrs(attrs), key: index },
                children.map(renderIconNode)
            );
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    aria-hidden="true"
                    className={`lucide lucide-${name} ${className}`.trim()}
                >
                    {iconData.map(renderIconNode)}
                </svg>
            );
        };

        // --- Default Data ---
        const DEFAULT_DECK = {
            id: 'default_001',
            name: '範例單元：成語練習',
            publisher: '範例',
            book: '範例冊',
            lessonNo: 1,
            category: 'idiom',
            cards: [
                { id: 'c1', word: '一心一意', definition: '指心意專一，沒有其他的想法。', example: '姐姐做事一心一意，所以很快就做完了。' },
                { id: 'c2', word: '五花八門', definition: '比喻花樣繁多，變化多端。', example: '夜市裡的小吃五花八門，讓人看了眼花撩亂。' },
                { id: 'c3', word: '七上八下', definition: '形容心情忐忑不安。', example: '就要公佈成績了，我的心裡七上八下的。' },
                { id: 'c4', word: '井底之蛙', definition: '比喻見識淺薄的人。', example: '我們應該多讀書，才不會成為井底之蛙。' },
                { id: 'c5', word: '守株待兔', definition: '比喻拘泥守成，不知變通。', example: '做事要主動積極，不能守株待兔。' }
            ]
        };

        const SEED_DATA_URL = 'seed_翰林114一上.json';
        const STORAGE_KEY = 'mandarin_tutor_data_v2';
        const CLOUD_LIBRARY_ID_KEY = 'mandarin_cloud_library_id';
        const DEFAULT_CLOUD_LIBRARY_ID = '890712';
        const PUBLISHED_APP_URL = 'https://teajsps-ux.github.io/jsps-tools/tools/mandarin-flashcard/index.html';
        const VISION_ENDPOINT_STORAGE_KEY = 'mandarin_vision_endpoint';
        const DEFAULT_VISION_ENDPOINT = '';
        const LEGACY_UNDEPLOYED_VISION_ENDPOINT = 'https://asia-east1-jsps-tools-sync.cloudfunctions.net/parseMandarinFlashcards';
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyA0lSykngwrK5exy1rxD4TZ96RqeVD4x9U",
            authDomain: "jsps-tools-sync.firebaseapp.com",
            projectId: "jsps-tools-sync",
            storageBucket: "jsps-tools-sync.firebasestorage.app",
            messagingSenderId: "435781850232",
            appId: "1:435781850232:web:bedbf1e1cd942e972b898d"
        };
        const DEFAULT_PUBLISHER = '翰林';
        const DEFAULT_BOOK = '114一上';
        const PUBLISHER_OPTIONS = ['翰林', '康軒', '南一'];
        const BOOK_YEARS = ['114', '115'];
        const BOOK_GRADES = ['一', '二', '三', '四', '五', '六'];
        const BOOK_TERMS = ['上', '下'];
        const BOOK_OPTIONS = BOOK_YEARS.flatMap(year => BOOK_GRADES.flatMap(grade => BOOK_TERMS.map(term => `${year}${grade}${term}`)));
        const DECK_CATEGORIES = {
            vocabulary: { label: '語詞解釋', shortLabel: '語詞', color: 'bg-sky-100 text-sky-800 border-sky-200' },
            idiom: { label: '成語解釋', shortLabel: '成語', color: 'bg-amber-100 text-amber-800 border-amber-200' },
            other: { label: '其他閃卡', shortLabel: '其他', color: 'bg-gray-100 text-gray-700 border-gray-200' }
        };
        const CATEGORY_ORDER = { vocabulary: 1, idiom: 2, other: 9 };
        const sanitizeCloudLibraryId = (value) => (value || '').trim().replace(/[^\w-]/g, '-').slice(0, 48);
        const getUrlCloudLibraryId = () => {
            try {
                const params = new URLSearchParams(window.location.search);
                return sanitizeCloudLibraryId(params.get('library') || params.get('lib') || '');
            } catch {
                return '';
            }
        };
        const isParentShareMode = () => {
            try {
                return new URLSearchParams(window.location.search).get('parent') === '1';
            } catch {
                return false;
            }
        };

        const getCategoryInfo = (category) => DECK_CATEGORIES[category] || DECK_CATEGORIES.other;

        const parseDeckMeta = (deck = {}) => {
            const name = deck.name || '';
            const compact = name.replace(/\s+/g, '');
            const lessonMatch = compact.match(/L\.?(\d+)|第(\d+)課/);
            const lessonNo = deck.lessonNo || (lessonMatch ? parseInt(lessonMatch[1] || lessonMatch[2], 10) : '');
            let category = deck.category || 'other';
            if (/背?解釋|語詞|詞語/.test(compact) && !/成語/.test(compact)) category = 'vocabulary';
            if (/成語/.test(compact)) category = 'idiom';
            let publisher = deck.publisher || DEFAULT_PUBLISHER;
            if (compact.includes('康軒')) publisher = '康軒';
            if (compact.includes('南一')) publisher = '南一';
            if (compact.includes('範例')) publisher = '範例';
            let book = deck.book || DEFAULT_BOOK;
            const bookMatch = compact.match(/(\d{3}[一二三四五六]上|\d{3}[一二三四五六]下|[一二三四五六]上|[一二三四五六]下)/);
            if (bookMatch) book = bookMatch[1].length <= 2 ? `114${bookMatch[1]}` : bookMatch[1];
            return { publisher, book, lessonNo, category };
        };

        const buildDeckName = ({ publisher, book, lessonNo, category }) => {
            const categoryText = getCategoryInfo(category).label;
            const lessonText = lessonNo ? `L.${lessonNo}` : '未分課';
            return `${publisher || DEFAULT_PUBLISHER}${book || DEFAULT_BOOK}${lessonText}${categoryText}`;
        };

        const sortDecksByCourse = (a, b) => {
            const ma = parseDeckMeta(a);
            const mb = parseDeckMeta(b);
            return `${ma.publisher}|${ma.book}|${String(ma.lessonNo).padStart(3, '0')}|${CATEGORY_ORDER[ma.category] || 9}`.localeCompare(
                `${mb.publisher}|${mb.book}|${String(mb.lessonNo).padStart(3, '0')}|${CATEGORY_ORDER[mb.category] || 9}`,
                'zh-Hant'
            );
        };

        const normalizeDecks = (rawDecks, shouldRegenerateIds = false) => {
            if (!Array.isArray(rawDecks)) throw new Error('Deck data must be an array');
            return rawDecks.map((deck) => {
                const deckId = shouldRegenerateIds ? generateId() : (deck.id || generateId());
                const meta = parseDeckMeta(deck);
                return {
                    id: deckId,
                    name: deck.name || buildDeckName(meta),
                    publisher: meta.publisher,
                    book: meta.book,
                    lessonNo: meta.lessonNo,
                    category: meta.category,
                    cards: Array.isArray(deck.cards) ? deck.cards.map((card) => ({
                        id: shouldRegenerateIds ? generateId() : (card.id || generateId()),
                        word: card.word || '未知',
                        definition: card.definition || '',
                        example: card.example || ''
                    })) : []
                };
            });
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- TTS ---
        const speakText = (text, onEnd = null) => {
            const done = () => {
                if (onEnd) onEnd();
            };
            if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
                setTimeout(done, 250);
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.9;
            let finished = false;
            let fallbackTimer = null;
            const finishOnce = () => {
                if (finished) return;
                finished = true;
                if (fallbackTimer) clearTimeout(fallbackTimer);
                done();
            };
            utterance.onend = finishOnce;
            utterance.onerror = finishOnce;
            const fallbackMs = Math.min(30000, Math.max(6000, String(text || '').length * 380));
            if (onEnd) fallbackTimer = setTimeout(finishOnce, fallbackMs);
            window.speechSynthesis.speak(utterance);
        };

        // --- Parser ---
        const parseContent = (text) => {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            const cards = [];
            lines.forEach(line => {
                let cleanLine = line.replace(/^\d+[\.\、\s]\s*/, '').trim();
                const splitIndex = cleanLine.search(/[:：]/);
                if (splitIndex > 0) {
                    const word = cleanLine.substring(0, splitIndex).trim();
                    const remaining = cleanLine.substring(splitIndex + 1).trim();
                    if (word && remaining) {
                        let definition = remaining;
                        let example = "（無例句）"; 
                        const exampleMatch = remaining.match(/([例造]句[:：])/);
                        if (exampleMatch) {
                            const exIndex = exampleMatch.index;
                            definition = remaining.substring(0, exIndex).trim();
                            const rawExample = remaining.substring(exIndex + exampleMatch[0].length).trim();
                            if (rawExample) { example = rawExample; }
                        }
                        cards.push({ id: generateId(), word: word, definition: definition, example: example });
                    }
                }
            });
            return cards;
        };

        const parseStructuredCards = (text) => {
            const raw = String(text || '').trim();
            if (!raw) return [];

            const tryParseJson = (value) => {
                try {
                    const parsed = JSON.parse(value);
                    const list = Array.isArray(parsed) ? parsed : parsed.cards;
                    if (!Array.isArray(list)) return [];
                    return list.map(card => ({
                        id: generateId(),
                        word: String(card.word || '').trim(),
                        definition: String(card.definition || '').trim(),
                        example: String(card.example || card.sentence || '').trim() || '（無例句）'
                    })).filter(card => card.word && card.definition);
                } catch (error) {
                    return [];
                }
            };

            const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
            const jsonCards = tryParseJson(fenced ? fenced[1].trim() : raw);
            if (jsonCards.length > 0) return jsonCards;

            const tableCards = raw.split('\n')
                .map(line => line.trim())
                .filter(Boolean)
                .map(line => line.replace(/^\d+[\.\、\s]\s*/, ''))
                .map(line => line.split(/[|｜\t]/).map(part => part.trim()))
                .filter(parts => parts.length >= 2)
                .map(parts => ({
                    id: generateId(),
                    word: parts[0],
                    definition: parts[1],
                    example: parts.slice(2).join('｜') || '（無例句）'
                }))
                .filter(card => card.word && card.definition);
            if (tableCards.length > 0) return tableCards;

            return parseContent(raw);
        };

        // --- Modal (Glass Style) ---
        const Modal = ({ isOpen, title, content, onConfirm, onCancel, showConfirm = true, showCancel = true, confirmText="確定", cancelText="取消" }) => {
            if (!isOpen) return null;
            const handleConfirmClick = onConfirm || onCancel || (() => {});
            const handleCancelClick = onCancel || (() => {});
            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="glass-box p-6 max-w-md w-full animate-bounce-in">
                        <h3 className="text-2xl font-bold mb-4 text-center border-b-2 border-gray-300 pb-2 text-gray-800">{title}</h3>
                        <div className="mb-6 text-lg whitespace-pre-wrap text-gray-700">{content}</div>
                        <div className="flex justify-center space-x-4">
                            {showCancel && <button onClick={handleCancelClick} className="px-6 py-2 bg-gray-100 border-2 border-gray-400 rounded-lg hover:bg-gray-200 font-bold text-gray-700">{cancelText}</button>}
                            {showConfirm && <button onClick={handleConfirmClick} className="px-6 py-2 bg-slate-700 border-2 border-slate-900 rounded-lg hover:bg-slate-800 font-bold text-white shadow-md">{confirmText}</button>}
                        </div>
                    </div>
                </div>
            );
        };

        // === 24 節氣表 ===（[月-日, 節氣名, 對應主題]，按時間排序）
        const SOLAR_TERMS = [
            ['01-05', '小寒', 'snow', 'solar-01-xiaohan.png'],   ['01-20', '大寒', 'snow', 'solar-02-dahan.png'],

        const getCurrentSolarTerm = () => {
            const d = new Date();
            const md = String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            // 1/1 ~ 1/4 屬於去年的「冬至」區間
            let cur = SOLAR_TERMS[SOLAR_TERMS.length - 1];
            for (const t of SOLAR_TERMS) {
                if (t[0] <= md) cur = t;
            }
            return { date: cur[0], name: cur[1], theme: cur[2], image: cur[3] };
        };

        const SOLAR_TERM_BACKGROUNDS = SOLAR_TERMS.map(([date, name, theme, file], index) => ({
            id: `solar-${String(index + 1).padStart(2, '0')}`,
            name: `節氣：${name}`,
            url: `backgrounds/solar-terms/${file}`,
            theme,
            season: theme === 'snow' || theme === 'stars' ? 'winter' : theme === 'ocean' || theme === 'rainbow' ? 'summer' : theme === 'maple' ? 'autumn' : 'spring'
        }));

        // === 粒子產生器（櫻花/雪花/楓葉/星星/泡泡） ===
        const generateParticles = (theme) => {
            const layer = document.getElementById('particles-layer');
            if (!layer) return;
            layer.innerHTML = '';
            let emoji, count, animClass;
            if (theme === 'sakura')      { emoji = '🌸'; count = 25; animClass = 'particle-sway'; }
            else if (theme === 'snow')   { emoji = '❄';  count = 40; animClass = 'particle-fall'; }
            else if (theme === 'maple')  { emoji = '🍁'; count = 22; animClass = 'particle-sway'; }
            else if (theme === 'stars')  { emoji = '✨'; count = 50; animClass = 'particle-twinkle'; }
            else if (theme === 'ocean')  { emoji = '🫧'; count = 36; animClass = 'particle-rise'; }
            else if (theme === 'rainbow'){ emoji = '💫'; count = 42; animClass = 'particle-twinkle'; }
            else return; // image：不需要粒子
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'particle ' + animClass;
                el.textContent = emoji;
                if (animClass === 'particle-twinkle') {
                    el.style.top = (Math.random() * 100) + '%';
                    el.style.left = (Math.random() * 100) + '%';
                    el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
                    el.style.animationDelay = (Math.random() * 3) + 's';
                    el.style.fontSize = (8 + Math.random() * 14) + 'px';
                } else if (animClass === 'particle-rise') {
                    el.style.bottom = '-12vh';
                    el.style.left = (Math.random() * 100) + '%';
                    el.style.animationDuration = (7 + Math.random() * 8) + 's';
                    el.style.animationDelay = (Math.random() * 10) + 's';
                    el.style.fontSize = (12 + Math.random() * 20) + 'px';
                } else {
                    el.style.left = (Math.random() * 100) + '%';
                    el.style.animationDuration = (8 + Math.random() * 8) + 's';
                    el.style.animationDelay = (Math.random() * 12) + 's';
                    el.style.fontSize = (12 + Math.random() * 18) + 'px';
                }
                layer.appendChild(el);
            }
        };

        const BG_MODE_KEY = 'mandarin_bg_mode';
        const BG_SELECTED_KEY = 'mandarin_bg_selected';
        const BG_SLIDESHOW_SECONDS_KEY = 'mandarin_bg_slideshow_seconds';
        const BG_HIDDEN_KEY = 'mandarin_bg_hidden_ids';
        const BG_NAME_OVERRIDES_KEY = 'mandarin_bg_name_overrides';
        const BG_INDEXED_DB = 'mandarin-backgrounds-db';
        const BG_INDEXED_STORE = 'images';
        const BACKGROUND_MANIFEST_URL = 'backgrounds/manifest.json';
        const BUILTIN_BACKGROUNDS = [
            ...SOLAR_TERM_BACKGROUNDS,
            { id: 'builtin-bg', name: '鍛造師原圖', url: 'bg.jpg', season: 'spring' },
            { id: 'builtin-snow', name: '雪山衝刺', url: 'backgrounds/bgg-snow.jpg', season: 'winter' },
            { id: 'builtin-math-0', name: '溫柔房間', url: 'backgrounds/bg-math-0.jpg', season: 'spring' },
            { id: 'builtin-math-1', name: '貓咪格紋', url: 'backgrounds/bg-math-1.jpg', season: 'spring' },
            { id: 'builtin-math-2', name: '花束祝福', url: 'backgrounds/bg-math-2.jpg', season: 'spring' },
            { id: 'builtin-math-3', name: '夏日校園', url: 'backgrounds/bg-math-3.jpg', season: 'summer' },
            { id: 'builtin-math-5', name: '山屋雪地', url: 'backgrounds/bg-math-5.jpg', season: 'winter' }
        ];
        const ANIMATED_BACKGROUNDS = [
            { id: 'sakura', label: '櫻花飄落' },
            { id: 'snow', label: '雪花紛飛' },
            { id: 'stars', label: '星空閃爍' },
            { id: 'maple', label: '楓葉飄動' },
            { id: 'ocean', label: '海浪流動' },
            { id: 'rainbow', label: '彩虹漸層' }
        ];
        const getSeasonByTheme = (theme) => {
            if (theme === 'snow') return 'winter';
            if (theme === 'ocean') return 'summer';
            if (theme === 'maple') return 'autumn';
            return 'spring';
        };
        const getFriendlyBackgroundName = (name, index = 1) => {
            const value = String(name || '').trim();
            if (!value || /^bg\d*$/i.test(value) || /^img[-_ ]?\d*$/i.test(value)) {
                return `請命名背景 ${index}`;
            }
            return value;
        };

        const openBackgroundDb = () => new Promise((resolve, reject) => {
            if (!window.indexedDB) {
                reject(new Error('這個瀏覽器不支援背景圖儲存'));
                return;
            }
            const request = indexedDB.open(BG_INDEXED_DB, 1);
            request.onupgradeneeded = () => {
                request.result.createObjectStore(BG_INDEXED_STORE, { keyPath: 'id' });
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });

        const loadCustomBackgrounds = async () => {
            const db = await openBackgroundDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(BG_INDEXED_STORE, 'readonly');
                const request = tx.objectStore(BG_INDEXED_STORE).getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
                tx.oncomplete = () => db.close();
            });
        };

        const saveCustomBackground = async (item) => {
            const db = await openBackgroundDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(BG_INDEXED_STORE, 'readwrite');
                tx.objectStore(BG_INDEXED_STORE).put(item);
                tx.oncomplete = () => { db.close(); resolve(); };
                tx.onerror = () => reject(tx.error);
            });
        };

        const deleteCustomBackground = async (id) => {
            const db = await openBackgroundDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(BG_INDEXED_STORE, 'readwrite');
                tx.objectStore(BG_INDEXED_STORE).delete(id);
                tx.oncomplete = () => { db.close(); resolve(); };
                tx.onerror = () => reject(tx.error);
            });
        };

        const fileToDataUrl = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(file);
        });

        // --- Player Colors (Vibrant/Cinematic Palette) ---
        const COLOR_PALETTE = [
            { id: 0, name: '寶石藍', bg: 'bg-blue-500', text: 'text-white', border: 'border-blue-800', light: 'bg-blue-100' },
            { id: 1, name: '赤紅', bg: 'bg-red-500', text: 'text-white', border: 'border-red-800', light: 'bg-red-100' },
            { id: 2, name: '翡翠綠', bg: 'bg-emerald-500', text: 'text-white', border: 'border-emerald-800', light: 'bg-emerald-100' },
            { id: 3, name: '琥珀黃', bg: 'bg-amber-400', text: 'text-black', border: 'border-amber-700', light: 'bg-amber-100' },
            { id: 4, name: '皇家紫', bg: 'bg-violet-500', text: 'text-white', border: 'border-violet-800', light: 'bg-violet-100' },
            { id: 5, name: '烈焰橘', bg: 'bg-orange-500', text: 'text-white', border: 'border-orange-800', light: 'bg-orange-100' },
            { id: 6, name: '霓虹粉', bg: 'bg-pink-500', text: 'text-white', border: 'border-pink-800', light: 'bg-pink-100' },
            { id: 7, name: '酷黑', bg: 'bg-gray-900', text: 'text-white', border: 'border-black', light: 'bg-gray-300' },
        ];

        // --- App Component ---
        const App = () => {
            const [decks, setDecks] = useState([]);
            const [currentDeckId, setCurrentDeckId] = useState(null);
            const [view, setView] = useState('HOME');
            const [modalConfig, setModalConfig] = useState({ isOpen: false });
            
            // Quiz State
            const [quizCards, setQuizCards] = useState([]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [score, setScore] = useState({ correct: 0, wrong: 0, wrongCards: [] });
            const [isSpeaking, setIsSpeaking] = useState(false);

            // Edit State
            const [editName, setEditName] = useState('');
            const [editPublisher, setEditPublisher] = useState(DEFAULT_PUBLISHER);
            const [editBook, setEditBook] = useState(DEFAULT_BOOK);
            const [editLessonNo, setEditLessonNo] = useState('');
            const [editCategory, setEditCategory] = useState('vocabulary');
            const [batchInput, setBatchInput] = useState('');
            const [ocrStatus, setOcrStatus] = useState('');
            const [ocrReviewCards, setOcrReviewCards] = useState([]);
            const [visionEndpoint, setVisionEndpoint] = useState(() => {
                const savedEndpoint = localStorage.getItem(VISION_ENDPOINT_STORAGE_KEY) || DEFAULT_VISION_ENDPOINT;
                return savedEndpoint === LEGACY_UNDEPLOYED_VISION_ENDPOINT ? '' : savedEndpoint;
            });
            const [cloudLibraryId, setCloudLibraryId] = useState(() => {
                const urlLibraryId = getUrlCloudLibraryId();
                if (urlLibraryId) {
                    localStorage.setItem(CLOUD_LIBRARY_ID_KEY, urlLibraryId);
                    return urlLibraryId;
                }
                return localStorage.getItem(CLOUD_LIBRARY_ID_KEY) || DEFAULT_CLOUD_LIBRARY_ID;
            });
            const [cloudStatus, setCloudStatus] = useState('本機題庫');
            const [cloudReady, setCloudReady] = useState(false);
            const [dataLoaded, setDataLoaded] = useState(false);
            const applyingRemoteRef = useRef(false);
            const cloudSaveTimerRef = useRef(null);
            const parentMode = isParentShareMode();

                : cloudReady
                    ? '題庫已同步'
                    : cloudStatus.includes('失敗')
                        ? '題庫同步暫時失敗'
                        : '正在同步題庫';

            // Course Browser State
            const [filterPublisher, setFilterPublisher] = useState('全部');
            const [filterBook, setFilterBook] = useState('全部');
            const [filterLesson, setFilterLesson] = useState('全部');
            const [filterCategory, setFilterCategory] = useState('全部');

            // Battle Setup State
            const [setupMode, setSetupMode] = useState('STREAK_STATIC');
            const [setupSide, setSetupSide] = useState(3);
            const [setupPlayerCount, setSetupPlayerCount] = useState(3);
            const [setupSelectedDecks, setSetupSelectedDecks] = useState([]); 
            const [playerConfig, setPlayerConfig] = useState([
                { name: '藍隊', colorId: 0 }, { name: '紅隊', colorId: 1 }, { name: '綠隊', colorId: 2 },
                { name: '黃隊', colorId: 3 }, { name: '紫隊', colorId: 4 }, { name: '橘隊', colorId: 5 },
            ]);

            // Battle Game State
            const [gameMode, setGameMode] = useState(null);
            const [gridSide, setGridSide] = useState(3);
            const [battleGrid, setBattleGrid] = useState([]);
            const [activePlayers, setActivePlayers] = useState([]);
            const [playerCount, setPlayerCount] = useState(2);
            const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
            const [battleWinner, setBattleWinner] = useState(null);
            const [selectedGridIndex, setSelectedGridIndex] = useState(null);
            const [winnerDetails, setWinnerDetails] = useState(null);

            // === 背景圖庫狀態 ===
            const [bgMode, setBgMode] = useState(() => {
                const savedMode = localStorage.getItem(BG_MODE_KEY) || localStorage.getItem('mandarin_bg_theme') || 'auto';
                return savedMode === 'image' ? 'manual' : savedMode;
            });
            const [selectedBgId, setSelectedBgId] = useState(() => localStorage.getItem(BG_SELECTED_KEY) || BUILTIN_BACKGROUNDS[0].id);
            const [manifestBackgrounds, setManifestBackgrounds] = useState([]);
            const [customBackgrounds, setCustomBackgrounds] = useState([]);
            const [hiddenBackgroundIds, setHiddenBackgroundIds] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem(BG_HIDDEN_KEY) || '[]');
                } catch {
                    return [];
                }
            });
            const [backgroundNameOverrides, setBackgroundNameOverrides] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem(BG_NAME_OVERRIDES_KEY) || '{}');
                } catch {
                    return {};
                }
            });
            const [bgPanelOpen, setBgPanelOpen] = useState(false);
            const [slideshowSeconds, setSlideshowSeconds] = useState(() => Number(localStorage.getItem(BG_SLIDESHOW_SECONDS_KEY)) || 12);
            const [slideIndex, setSlideIndex] = useState(0);
            const [autoTermName, setAutoTermName] = useState(() => getCurrentSolarTerm().name);

            useEffect(() => {
                loadCustomBackgrounds()
                    .then(setCustomBackgrounds)
                    .catch(() => setCustomBackgrounds([]));
            }, []);

            const manifestOnlyBackgrounds = manifestBackgrounds.filter(bg =>
                bg && bg.id && bg.url && !BUILTIN_BACKGROUNDS.some(item => item.id === bg.id || item.url === bg.url)
            );
            const allBackgrounds = [...BUILTIN_BACKGROUNDS, ...manifestOnlyBackgrounds, ...customBackgrounds]
                .filter(bg => !hiddenBackgroundIds.includes(bg.id))
                .map((bg, index) => ({ ...bg, name: backgroundNameOverrides[bg.id] || getFriendlyBackgroundName(bg.name, index + 1) }));
            const selectedBackground = allBackgrounds.find(bg => bg.id === selectedBgId) || allBackgrounds[0];
            const slideshowBackground = allBackgrounds.length ? allBackgrounds[slideIndex % allBackgrounds.length] : selectedBackground;

            useEffect(() => {
                localStorage.setItem(BG_HIDDEN_KEY, JSON.stringify(hiddenBackgroundIds));
            }, [hiddenBackgroundIds]);

            useEffect(() => {
                localStorage.setItem(BG_NAME_OVERRIDES_KEY, JSON.stringify(backgroundNameOverrides));
            }, [backgroundNameOverrides]);

            useEffect(() => {
                let cancelled = false;
                fetch(BACKGROUND_MANIFEST_URL, { cache: 'no-store' })
                    .then(response => response.ok ? response.json() : [])
                    .then(items => {
                        if (cancelled || !Array.isArray(items)) return;
                        const cleanItems = items
                            .filter(item => item && item.id && item.name && item.url)
                            .map(item => ({
                                id: String(item.id),
                                name: String(item.name),
                                url: String(item.url),
                                season: item.season || 'spring'
                            }));
                        setManifestBackgrounds(cleanItems);
                    })
                    .catch(() => setManifestBackgrounds([]));
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                if (bgMode !== 'slideshow' || allBackgrounds.length <= 1) return;
                const seconds = Math.max(3, Math.min(120, Number(slideshowSeconds) || 12));
                const timer = setInterval(() => {
                    setSlideIndex(index => (index + 1) % allBackgrounds.length);
                }, seconds * 1000);
                return () => clearInterval(timer);
            }, [bgMode, slideshowSeconds, allBackgrounds.length]);

            useEffect(() => {
                let actualTheme = bgMode;
                let imageUrl = '';

                if (bgMode === 'auto') {
                    const term = getCurrentSolarTerm();
                    actualTheme = term.theme;
                    setAutoTermName(term.name);
                    imageUrl = term.image ? `backgrounds/solar-terms/${term.image}` : '';
                } else if (bgMode === 'manual') {
                    actualTheme = 'image';
                    imageUrl = selectedBackground?.url || '';
                } else if (bgMode === 'slideshow') {
                    actualTheme = 'image';
                    imageUrl = slideshowBackground?.url || '';
                }

                document.body.style.removeProperty('--mandarin-bg-image');
                document.body.style.animation = '';
                if (imageUrl) {
                    document.body.className = 'theme-image';
                    document.body.style.setProperty('--mandarin-bg-image', `url("${imageUrl}")`);
                } else {
                    document.body.className = 'theme-' + actualTheme;
                }
                generateParticles(actualTheme);
                localStorage.setItem(BG_MODE_KEY, bgMode);
                localStorage.setItem(BG_SELECTED_KEY, selectedBgId);
                localStorage.setItem(BG_SLIDESHOW_SECONDS_KEY, String(slideshowSeconds));
            }, [bgMode, selectedBgId, selectedBackground?.url, slideshowBackground?.url, slideshowSeconds, allBackgrounds.length]);

            useEffect(() => {
                let isMounted = true;
                const applyDecks = (nextDecks) => {
                    if (!isMounted) return;
                    setDecks(nextDecks);
                    setSetupSelectedDecks(nextDecks.map(d => d.id));
                    setDataLoaded(true);
                };

                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    try { 
                        applyDecks(normalizeDecks(JSON.parse(savedData)));
                    } catch(e) {
                        localStorage.removeItem(STORAGE_KEY);
                        applyDecks([DEFAULT_DECK]);
                    }
                } else { 
                    fetch(SEED_DATA_URL)
                        .then(response => {
                            if (!response.ok) throw new Error('Seed data not found');
                            return response.json();
                        })
                        .then(seedDecks => applyDecks(normalizeDecks(seedDecks)))
                        .catch(() => applyDecks([DEFAULT_DECK]));
                }
                return () => { isMounted = false; };
            }, []);

            useEffect(() => {
                if (decks.length > 0) { localStorage.setItem(STORAGE_KEY, JSON.stringify(decks)); }
            }, [decks]);

            useEffect(() => {
                if (!cloudLibraryId.trim()) {
                    setCloudReady(false);
                    setCloudStatus('本機題庫');
                    return;
                }
                if (!dataLoaded) {
                    setCloudReady(false);
                    setCloudStatus('等待本機題庫載入');
                    return;
                }
                if (!window.firebase || !window.firebase.apps) {
                    setCloudStatus('Firebase SDK 尚未載入');
                    return;
                }

                let unsubscribe = null;
                let cancelled = false;
                const libraryId = cloudLibraryId.trim();
                localStorage.setItem(CLOUD_LIBRARY_ID_KEY, libraryId);
                setCloudReady(false);
                setCloudStatus(`連線雲端題庫：${libraryId}`);

                const initCloud = async () => {
                    try {
                        if (!window.firebase.apps.length) window.firebase.initializeApp(FIREBASE_CONFIG);
                        await window.firebase.auth().signInAnonymously();
                        if (cancelled) return;
                        const db = window.firebase.firestore();
                        const docRef = db.collection('mandarin-flashcard-libraries').doc(libraryId);
                        unsubscribe = docRef.onSnapshot(async (snapshot) => {
                            if (!snapshot.exists) {
                                await docRef.set({
                                    decks: normalizeDecks(decks),
                                    updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
                                }, { merge: true });
                                setCloudReady(true);
                                setCloudStatus(`已建立雲端題庫：${libraryId}`);
                                return;
                            }
                            const remoteDecks = normalizeDecks(snapshot.data().decks || []);
                            if (remoteDecks.length > 0) {
                                applyingRemoteRef.current = true;
                                setDecks(remoteDecks);
                                setSetupSelectedDecks(remoteDecks.map(d => d.id));
                            }
                            setCloudReady(true);
                            setCloudStatus(`雲端同步中：${libraryId}`);
                        }, (error) => {
                            setCloudReady(false);
                            setCloudStatus(`雲端同步失敗：${error.message}`);
                        });
                    } catch (error) {
                        setCloudReady(false);
                        setCloudStatus(`雲端登入失敗：${error.message}`);
                    }
                };

                initCloud();
                return () => {
                    cancelled = true;
                    if (unsubscribe) unsubscribe();
                };
            }, [cloudLibraryId, dataLoaded]);

            useEffect(() => {
                if (!dataLoaded || !cloudReady || !cloudLibraryId.trim() || decks.length === 0) return;
                if (applyingRemoteRef.current) {
                    applyingRemoteRef.current = false;
                    return;
                }
                if (!window.firebase || !window.firebase.apps.length) return;
                if (cloudSaveTimerRef.current) clearTimeout(cloudSaveTimerRef.current);
                cloudSaveTimerRef.current = setTimeout(() => {
                    const db = window.firebase.firestore();
                    db.collection('mandarin-flashcard-libraries').doc(cloudLibraryId.trim()).set({
                        decks: normalizeDecks(decks),
                        updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true })
                        .then(() => setCloudStatus(`已同步到雲端：${cloudLibraryId.trim()}`))
                        .catch(error => setCloudStatus(`雲端儲存失敗：${error.message}`));
                }, 800);
                return () => {
                    if (cloudSaveTimerRef.current) clearTimeout(cloudSaveTimerRef.current);
                };
            }, [decks, cloudReady, cloudLibraryId, dataLoaded]);

            // --- Helpers ---
            const showModal = (config) => setModalConfig({ ...config, isOpen: true });
            const closeModal = () => setModalConfig({ ...modalConfig, isOpen: false });

            const addBackgroundFiles = async (event) => {
                const files = Array.from(event.target.files || []).filter(file => file.type.startsWith('image/'));
                if (files.length === 0) return;
                const nextItems = [];
                for (const [index, file] of files.entries()) {
                    const dataUrl = await fileToDataUrl(file);
                    const nextNumber = customBackgrounds.length + nextItems.length + 1;
                    const fileBaseName = file.name.replace(/\.[^.]+$/, '').slice(0, 24);
                    const item = {

            // --- Logic Functions (V9.2.1) ---
            const createDeck = () => {
                showModal({

                    content: (
                        <div className="grid grid-cols-1 gap-3">

            const moveDeck = (index, direction) => {

                if (direction === -1 && index > 0) [newDecks[index], newDecks[index - 1]] = [newDecks[index - 1], newDecks[index]];
                else if (direction === 1 && index < newDecks.length - 1) [newDecks[index], newDecks[index + 1]] = [newDecks[index + 1], newDecks[index]];
                setDecks(newDecks);

            const startEdit = (deckId) => {

                if (deck) {

            const saveDeck = () => {

            const parseAndAddCards = () => {

                if (newCards.length === 0) { showModal({ title: "無法辨識", content: "請貼 JSON，或每行使用「詞語｜解釋｜例句」，也可使用「詞語：解釋」。", showCancel: false, onConfirm: closeModal }); return; }
                setDecks(decks.map(d => d.id === currentDeckId ? { ...d, cards: [...(d.cards || []), ...newCards] } : d));
                setBatchInput('');
                showModal({ title: "成功加入", content: `成功加入了 ${newCards.length} 張卡片！`, showCancel: false, onConfirm: closeModal });
            };

            const getOcrBox = (item) => item.bbox || item.boundingBox || item.box || null;

            const cleanOcrToken = (text) => String(text || '').replace(/\s+/g, '').trim();
            const BOPOMOFO_REGEX = /[\u3100-\u312f\u31a0-\u31bf]/g;
            const BOPOMOFO_BLACKLIST = 'ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦㄧㄨㄩㄪㄫㄬㄭㄮㄯ㄰ㄱㄲㄳㄴㄵㄶㄷㄸㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅃㅄㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';

            const getOcrItems = (data) => {
                const source = [data?.symbols, data?.words, data?.lines].find(list => Array.isArray(list) && list.length > 0) || [];
                return source
                    .map(item => {
                        const box = getOcrBox(item);
                        const text = cleanOcrToken(item.text);
                        if (!box || !text) return null;
                        const x0 = Number(box.x0 ?? box.left ?? 0);
                        const y0 = Number(box.y0 ?? box.top ?? 0);
                        const x1 = Number(box.x1 ?? box.right ?? x0);
                        const y1 = Number(box.y1 ?? box.bottom ?? y0);
                        return {
                            text,
                            x0,
                            y0,
                            x1,
                            y1,
                            xCenter: (x0 + x1) / 2,
                            width: Math.max(1, x1 - x0)
                        };
                    })
                    .filter(Boolean);
            };

            const buildVerticalOcrText = (data) => {
                const items = getOcrItems(data);
                if (items.length === 0) return '';
                const widths = items.map(item => item.width).sort((a, b) => a - b);
                const medianWidth = widths[Math.floor(widths.length / 2)] || 16;
                const columnThreshold = Math.max(18, medianWidth * 1.8);
                const columns = [];

                [...items].sort((a, b) => b.xCenter - a.xCenter).forEach(item => {
                    const column = columns.find(col => Math.abs(col.xCenter - item.xCenter) <= columnThreshold);
                    if (column) {
                        column.items.push(item);
                        column.xCenter = column.items.reduce((sum, current) => sum + current.xCenter, 0) / column.items.length;
                    } else {
                        columns.push({ xCenter: item.xCenter, items: [item] });
                    }
                });

                return columns
                    .sort((a, b) => b.xCenter - a.xCenter)
                    .map(column => column.items.sort((a, b) => a.y0 - b.y0).map(item => item.text).join(''))
                    .filter(Boolean)
                    .join('\n');
            };

            const loadImageFile = (file) => new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = reject;
                image.src = URL.createObjectURL(file);
            });

            const cropImageToBlob = (image, crop, options = {}) => new Promise((resolve) => {
                const scale = options.scale || 3;
                const padX = crop.width * (options.padX ?? 0.08);
                const padY = crop.height * (options.padY ?? 0.08);
                const sourceX = Math.max(0, crop.x + padX);
                const sourceY = Math.max(0, crop.y + padY);
                const sourceWidth = Math.max(1, Math.min(image.width - sourceX, crop.width - padX * 2));
                const sourceHeight = Math.max(1, Math.min(image.height - sourceY, crop.height - padY * 2));
                const canvas = document.createElement('canvas');
                canvas.width = Math.max(1, Math.round(sourceWidth * scale));
                canvas.height = Math.max(1, Math.round(sourceHeight * scale));
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(
                    image,
                    sourceX,
                    sourceY,
                    sourceWidth,
                    sourceHeight,
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );
                if (options.preprocess !== false) {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const lightness = (Math.max(r, g, b) + Math.min(r, g, b)) / 2;
                        const gray = r * 0.299 + g * 0.587 + b * 0.114;
                        const isPaleGrid = lightness > 165 && r > g && g > b;
                        const isVeryLight = gray > 205;
                        const isText = gray < 172 && !isPaleGrid;
                        const value = isText ? 0 : 255;
                        data[i] = value;
                        data[i + 1] = value;
                        data[i + 2] = value;
                        data[i + 3] = 255;
                        if (isVeryLight || isPaleGrid) {
                            data[i] = 255;
                            data[i + 1] = 255;
                            data[i + 2] = 255;
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                }
                canvas.toBlob(resolve, 'image/png');
            });

            const cropImageToDataUrl = (image, crop) => {
                const padX = crop.width * 0.04;
                const padY = crop.height * 0.03;
                const sourceX = Math.max(0, crop.x + padX);
                const sourceY = Math.max(0, crop.y + padY);
                const sourceWidth = Math.max(1, Math.min(image.width - sourceX, crop.width - padX * 2));
                const sourceHeight = Math.max(1, Math.min(image.height - sourceY, crop.height - padY * 2));
                const canvas = document.createElement('canvas');
                const maxHeight = 360;
                const scale = Math.min(1, maxHeight / sourceHeight);
                canvas.width = Math.max(1, Math.round(sourceWidth * scale));
                canvas.height = Math.max(1, Math.round(sourceHeight * scale));
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, canvas.width, canvas.height);
                return canvas.toDataURL('image/jpeg', 0.88);
            };

            const fileToDataUrl = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            const parseImageWithVisionApi = async (file) => {
                if (!visionEndpoint.trim()) return null;
                const dataUrl = await fileToDataUrl(file);
                const imageBase64 = dataUrl.split(',')[1] || '';
                const response = await fetch(visionEndpoint.trim(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        imageBase64,
                        mimeType: file.type || 'image/jpeg',
                        publisher: editPublisher,
                        book: editBook,
                        lessonNo: editLessonNo,
                        category: editCategory
                    })
                });
                if (!response.ok) throw new Error(`Vision API failed: ${response.status}`);
                const payload = await response.json();
                const cards = Array.isArray(payload.cards) ? payload.cards : [];
                return cards
                    .map(card => ({
                        id: generateId(),
                        word: cleanTableCellText(card.word || '', 'word'),
                        definition: cleanTableCellText(card.definition || '', 'definition'),
                        example: cleanTableCellText(card.example || '', 'example') || '（無例句）'
                    }))
                    .filter(card => card.word || card.definition || card.example !== '（無例句）');
            };

            const cleanTableCellText = (text, type) => {
                let value = String(text || '')
                    .replace(/\s+/g, '')
                    .replace(BOPOMOFO_REGEX, '')
                    .replace(/[|｜]/g, '')
                    .replace(/[「」]/g, '')
                    .replace(/[#＃$＄%％&＆*＊@＠^＾_＿=＝+＋~～`｀\\]/g, '')
                    .replace(/[·•‧]/g, '')
                    .trim();
                if (type === 'word') value = value.replace(/^[\d一二三四五六七八九十]+[.\、]*/, '').replace(/詞語|語詞|成語/g, '').replace(/[^\u3400-\u9fff]/g, '');
                if (type === 'definition') value = value.replace(/^解釋[:：]?/, '').replace(/^[\d一二三四五六七八九十]+[.\、]*/, '');
                if (type === 'example') value = value.replace(/^造句[:：]?/, '').replace(/^[\d一二三四五六七八九十]+[.\、]*/, '');
                return value.trim();
            };

            const recognizeVerticalBlob = async (blob, label) => {
                let result;
                try {
                    result = await window.Tesseract.recognize(blob, 'chi_tra_vert+chi_tra+eng', {
                        tessedit_pageseg_mode: '5',
                        preserve_interword_spaces: '1',
                        tessedit_char_blacklist: BOPOMOFO_BLACKLIST
                    });
                } catch (error) {
                    result = await window.Tesseract.recognize(blob, 'chi_tra+eng', {
                        tessedit_pageseg_mode: '5',
                        preserve_interword_spaces: '1',
                        tessedit_char_blacklist: BOPOMOFO_BLACKLIST
                    });
                }
                const verticalText = buildVerticalOcrText(result.data);
                return cleanTableCellText(verticalText || result.data?.text || '', label);
            };

            const recognizeVerticalTableCards = async (file) => {
                const image = await loadImageFile(file);
                const dataLeft = image.width * 0.032;
                const dataRight = image.width * 0.925;
                const tableTop = image.height * 0.072;
                const tableBottom = image.height * 0.962;
                const columnWidth = (dataRight - dataLeft) / 8;
                const rowCrops = {
                    word: { y: image.height * 0.145, height: image.height * 0.160 },
                    definition: { y: image.height * 0.305, height: image.height * 0.310 },
                    example: { y: image.height * 0.615, height: tableBottom - image.height * 0.615 }
                };
                const cards = [];

                for (let index = 0; index < 8; index++) {
                    const x = dataRight - columnWidth * (index + 1);
                    const preview = cropImageToDataUrl(image, { x, y: tableTop, width: columnWidth, height: tableBottom - tableTop });
                    setOcrStatus(`正在切表格辨識第 ${index + 1} 欄 / 8：詞語`);
                    const wordBlob = await cropImageToBlob(image, { x, y: rowCrops.word.y, width: columnWidth, height: rowCrops.word.height }, { padX: 0.20, padY: 0.12, scale: 4 });
                    const word = cleanTableCellText(await recognizeVerticalBlob(wordBlob, 'word'), 'word');

                    setOcrStatus(`正在切表格辨識第 ${index + 1} 欄 / 8：解釋`);
                    const definitionBlob = await cropImageToBlob(image, { x, y: rowCrops.definition.y, width: columnWidth, height: rowCrops.definition.height }, { padX: 0.10, padY: 0.08, scale: 3 });
                    const definition = cleanTableCellText(await recognizeVerticalBlob(definitionBlob, 'definition'), 'definition');

                    setOcrStatus(`正在切表格辨識第 ${index + 1} 欄 / 8：例句`);
                    const exampleBlob = await cropImageToBlob(image, { x, y: rowCrops.example.y, width: columnWidth, height: rowCrops.example.height }, { padX: 0.10, padY: 0.08, scale: 3 });
                    const example = cleanTableCellText(await recognizeVerticalBlob(exampleBlob, 'example'), 'example') || '（無例句）';

                    if (word || definition || example !== '（無例句）') {
                        cards.push({
                            id: generateId(),
                            word: word || `第 ${index + 1} 欄`,
                            definition,
                            example,
                            preview
                        });
                    }
                }

                return cards;
            };

            const importImageText = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = async (event) => {
                    const file = event.target.files?.[0];
                    if (!file) return;
                    setOcrStatus(visionEndpoint.trim() ? '正在交給 AI Vision 解析成「詞語 / 解釋 / 例句」...' : '未設定 AI 後端，使用 D 方案或本機 OCR 校對表。');
                    try {
                        if (visionEndpoint.trim()) {
                            try {
                                const aiCards = await parseImageWithVisionApi(file);
                                if (aiCards && aiCards.length > 0) {
                                    setOcrReviewCards(aiCards);
                                    setBatchInput(aiCards.map(card => `${card.word}：${card.definition} 例句：${card.example}`).join('\n'));
                                    setOcrStatus(`AI 已解析 ${aiCards.length} 張卡片。請在下方校對表確認後，再按「確認加入卡片」。`);
                                    return;
                                }
                            } catch (error) {
                                setOcrStatus('AI 後端目前無法使用，已改用本機 OCR 校對表。');
                            }
                        }

                        if (!window.Tesseract) {
                            showModal({ title: "圖片辨識失敗", content: "AI 後端尚未設定或無法使用，本機 OCR 套件也尚未載入。建議改用「複製 Google AI 模式提示詞」後，把 Google AI 模式整理出的 JSON 貼回來。", showCancel: false, onConfirm: closeModal });
                            setOcrStatus('');
                            return;
                        }

                        const tableCards = await recognizeVerticalTableCards(file);
                        if (tableCards.length === 0) {
                            setOcrStatus('');
                            showModal({ title: "沒有辨識到卡片", content: "這張圖無法切出詞語、解釋、例句。請確認是康軒這種直排表格截圖，或先手動貼上文字。", showCancel: false, onConfirm: closeModal });
                            return;
                        }
                        setOcrReviewCards(tableCards);
                        setBatchInput(tableCards.map(card => `${card.word}：${card.definition} 例句：${card.example}`).join('\n'));
                        setOcrStatus(`已切出 ${tableCards.length} 欄。OCR 只當草稿，請先在下方校對表修正，再按「確認加入卡片」。`);
                    } catch (error) {
                        setOcrStatus('');
                        showModal({ title: "圖片辨識失敗", content: "AI 或 OCR 暫時無法辨識這張圖片。請確認後端網址、金鑰與網路連線，或先手動貼上文字。", showCancel: false, onConfirm: closeModal });
                    }
                };
                input.click();
            };
            
            const moveCard = (index, direction) => {
                const deck = decks.find(d => d.id === currentDeckId);
                const cards = [...deck.cards];
                if (direction === -1 && index > 0) [cards[index], cards[index - 1]] = [cards[index - 1], cards[index]];
                else if (direction === 1 && index < cards.length - 1) [cards[index], cards[index + 1]] = [cards[index + 1], cards[index]];
                setDecks(decks.map(d => d.id === currentDeckId ? { ...d, cards } : d));
            };

            const updateCard = (cardId, field, value) => {
                setDecks(decks.map(d => d.id === currentDeckId ? {
                    ...d,
                    cards: d.cards.map(card => card.id === cardId ? { ...card, [field]: value } : card)
                } : d));
            };

            const addBlankCard = () => {
                const newCard = { id: generateId(), word: '', definition: '', example: '' };
                setDecks(decks.map(d => d.id === currentDeckId ? { ...d, cards: [...(d.cards || []), newCard] } : d));
            };

            const configureVisionEndpoint = () => {
                showModal({
                    title: "設定 AI 後端",
                    content: (
                        <div className="space-y-3">
                            <p className="text-sm text-gray-600">填入 Firebase Function 網址。API key 只放在 Firebase Secret，不要放在 HTML。</p>
                            <input
                                id="visionEndpointInput"
                                defaultValue={visionEndpoint}
                                className="w-full border-2 border-gray-300 rounded-lg p-2 text-sm outline-none focus:border-purple-300"
                                placeholder="https://parsemandarinflashcards-xxxxx.a.run.app"
                            />
                        </div>
                    ),
                    confirmText: "儲存",
                    onConfirm: () => {
                        const value = document.getElementById('visionEndpointInput')?.value.trim() || '';
                        localStorage.setItem(VISION_ENDPOINT_STORAGE_KEY, value);
                        setVisionEndpoint(value);
                        closeModal();
                    },
                    onCancel: closeModal
                });
            };

            const configureCloudLibrary = () => {
                showModal({
                    title: "雲端題庫同步",
                    content: (
                        <div className="space-y-3">
                            <p className="text-sm text-gray-600">輸入同一個題庫代碼，電腦和手機就會同步同一份閃卡。請用不容易被猜到的代碼。</p>
                            <input
                                id="cloudLibraryInput"
                                defaultValue={cloudLibraryId}
                                className="w-full border-2 border-gray-300 rounded-lg p-2 text-lg font-bold outline-none focus:border-emerald-300"
                                placeholder="例如 kx-115-a-7391"
                            />
                            <p className="text-xs text-gray-500">免費版使用 Firestore 同步，不使用 Firebase Functions。不要輸入學生姓名。</p>
                        </div>
                    ),
                    confirmText: "連線同步",
                    onConfirm: () => {
                        const value = (document.getElementById('cloudLibraryInput')?.value || '').trim();
                        if (!value) {
                            localStorage.removeItem(CLOUD_LIBRARY_ID_KEY);
                            setCloudLibraryId('');
                            setCloudStatus('本機題庫');
                        } else {
                            const safeValue = sanitizeCloudLibraryId(value);
                            localStorage.setItem(CLOUD_LIBRARY_ID_KEY, safeValue);

            const disconnectCloudLibrary = () => {

                setCloudStatus('本機題庫');

            const getParentShareUrl = () => {

            const copyParentShareLink = async () => {

                if (!shareUrl) {
                    showModal({
                        title: "還沒連線雲端題庫",

                        onConfirm: closeModal
                    });

                    await navigator.clipboard.writeText(shareUrl);
                    showModal({
                        title: "已複製家長連結",

                            <div className="space-y-3">
                                <p>把這個連結傳給家長。家長手機打開後會自動連到這份題庫，只要選閃卡開始測驗。</p>
                                <textarea readOnly value={shareUrl} className="w-full h-24 border-2 border-gray-300 rounded-lg p-2 text-xs" />
                            </div>
                        ),
                        showCancel: false,
                        onConfirm: closeModal
                    });

                        title: "請手動複製家長連結",

                        showCancel: false,
                        onConfirm: closeModal
                    });

            };

            const copyDPrompt = async () => {
                const categoryLabel = getCategoryInfo(editCategory).label;
                const prompt = [
                    `請幫我整理這張國小國語課本「${categoryLabel}」截圖，請務必依照課本原文整理。`,
                    `版本：${editPublisher}；冊別：${editBook}；課次：第 ${editLessonNo || '?'} 課。`,
                    '圖片是直排中文表格，閱讀順序是由右而左，每欄由上而下。',
                    '每一欄整理成一張閃卡：上方是詞語或成語，中間是解釋，下方是造句或例句。',
                    '請完全忽略注音、欄號、表格標題，以及「語詞」「解釋」「造句」這些列標籤。',
                    '不得改寫課本文字，不得補字，不得刪字，不得簡化，不得把前後句順序調換。',
                    '不要把解釋和造句混在一起；definition 只放解釋，example 只放造句或例句。',
                    '如果圖片中有標點符號，請盡量保留原標點。',
                    '請只輸出 JSON，不要 Markdown，不要解釋。',
                    '格式如下：',
                    '{"cards":[{"word":"詞語","definition":"解釋","example":"例句"}]}'
                ].join('\n');

                const showPromptModal = (copied) => {
                    showModal({
                        title: copied ? "提示詞已複製" : "手動複製提示詞",
                        content: (
                            <div className="space-y-3">
                                <p className="text-sm text-gray-600">
                                    {copied ? '請到 Google AI 模式貼上截圖與提示詞，再把 JSON 貼回文字框。' : '瀏覽器擋住自動複製時，請手動複製下面文字。'}
                                </p>
                                <textarea
                                    readOnly
                                    value={prompt}
                                    onFocus={(e) => e.target.select()}
                                    className="w-full h-64 border-2 border-gray-300 rounded-lg p-3 text-sm font-mono bg-white"
                                />
                            </div>
                        ),
                        showCancel: false,
                        confirmText: "知道了",
                        onConfirm: closeModal
                    });
                };

                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(prompt);
                    } else {
                        const temp = document.createElement('textarea');
                        temp.value = prompt;
                        temp.setAttribute('readonly', '');
                        temp.style.position = 'fixed';
                        temp.style.left = '-9999px';
                        document.body.appendChild(temp);
                        temp.select();
                        const copied = document.execCommand('copy');
                        temp.remove();
                        if (!copied) throw new Error('copy command failed');
                    }
                    setOcrStatus('已複製 Google AI 模式提示詞。請到 Google AI 模式貼上截圖與提示詞，再把 JSON 貼回文字框。');
                    showPromptModal(true);
                } catch (error) {
                    setOcrStatus('瀏覽器無法自動複製，請從提示視窗手動複製。');
                    showPromptModal(false);
                }
            };

            const updateOcrReviewCard = (cardId, field, value) => {
                setOcrReviewCards(ocrReviewCards.map(card => card.id === cardId ? { ...card, [field]: value } : card));
            };

            const deleteOcrReviewCard = (cardId) => {
                setOcrReviewCards(ocrReviewCards.filter(card => card.id !== cardId));
            };

            const confirmOcrReviewCards = () => {
                const confirmedCards = ocrReviewCards
                    .map(({ preview, ...card }) => ({
                        ...card,
                        word: card.word.trim(),
                        definition: card.definition.trim(),
                        example: card.example.trim() || '（無例句）'
                    }))
                    .filter(card => card.word || card.definition || card.example !== '（無例句）');
                if (confirmedCards.length === 0) {
                    showModal({ title: "沒有可加入的卡片", content: "請至少保留一張有內容的卡片。", showCancel: false, onConfirm: closeModal });
                    return;
                }
                setDecks(decks.map(d => d.id === currentDeckId ? { ...d, cards: [...(d.cards || []), ...confirmedCards] } : d));
                setOcrReviewCards([]);
                setBatchInput('');
                setOcrStatus(`已加入 ${confirmedCards.length} 張校對後的卡片。`);
            };
            
            const deleteCard = (cardId) => setDecks(decks.map(d => d.id === currentDeckId ? { ...d, cards: d.cards.filter(c => c.id !== cardId) } : d));
            
            const exportDecks = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(decks));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "國語文鍛造師_備份.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };
            
            const importDecks = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const sanitizedDecks = normalizeDecks(JSON.parse(event.target.result), true);
                            setDecks(prev => [...prev, ...sanitizedDecks]);
                            setSetupSelectedDecks(prev => [...prev, ...sanitizedDecks.map(d => d.id)]);
                            showModal({ title: "匯入成功", content: `成功匯入 ${sanitizedDecks.length} 個單元！`, showCancel: false, onConfirm: closeModal });
                        } catch (err) { showModal({ title: "匯入失敗", content: "檔案格式不正確。", showCancel: false, onConfirm: closeModal }); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            const loadSeedDecks = () => {
                fetch(SEED_DATA_URL)
                    .then(response => {
                        if (!response.ok) throw new Error('Seed data not found');
                        return response.json();
                    })
                    .then(seedDecks => {
                        const normalizedSeedDecks = normalizeDecks(seedDecks);
                        const existingNames = new Set(decks.map(deck => deck.name));
                        const missingDecks = normalizedSeedDecks.filter(deck => !existingNames.has(deck.name));
                        if (missingDecks.length === 0) {
                            showModal({ title: "已經載入", content: "翰林 114 一上題庫已經在你的題庫裡了。", showCancel: false, onConfirm: closeModal });
                            return;
