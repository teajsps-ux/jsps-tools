<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>頁面切換測試</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .slide { display: none; margin: 10px 0; padding: 20px; border: 1px solid #ccc; }
    .slide.active { display: block; background: #f0f0f0; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>頁面切換測試</h1>

  <div class="slide active" id="slide1">
    <h2>頁面 1 - 首頁</h2>
    <p>這是首頁。點擊按鈕查看頁面切換是否正常。</p>
    <button onclick="nextSlide()">下一頁 →</button>
  </div>

  <div class="slide" id="slide2">
    <h2>頁面 2 - 第一句</h2>
    <p>這是第二頁。點擊按鈕查看頁面切換是否正常。</p>
    <button onclick="prevSlide()">← 上一頁</button>
  </div>

  <button onclick="nextSlide()">下一頁</button>
  <button onclick="prevSlide()">上一頁</button>

  <button onclick="resetSlides()">重置頁面</button>

  <script>
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;

    function showSlide(index) {
      console.log('試圖切換到頁面:', index);
      console.log('當前頁面:', current);
      console.log('總頁面數:', total);

      if (index < 0) {
        current = total - 1;
        console.log('按左鍵：跳到最後一頁');
      } else if (index >= total) {
        current = 0;
        console.log('按右鍵：跳到第一頁');
      } else {
        current = index;
        console.log('按特定頁面鈕：切換到頁面', current + 1);
      }

      slides.forEach((slide, i) => slide.classList.toggle('active', i === current));
      console.log('實際切換到頁面:', current + 1);
    }

    function nextSlide() {
      showSlide(current + 1);
    }

    function prevSlide() {
      showSlide(current - 1);
    }

    function resetSlides() {
      current = 0;
      showSlide(0);
    }

    // 初始化
    showSlide(0);
  </script>
</body>
</html>
