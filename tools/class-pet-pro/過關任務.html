        body {

            touch-action: manipulation;
        }
        body.zhuyin-mode,
        body.zhuyin-mode * {
            font-family: 'Bpmf Iansui', 'BpmfIansui', 'Microsoft JhengHei', sans-serif !important;
        }
        body.zhuyin-mode .seat-number,
        body.zhuyin-mode .task-input,
        body.zhuyin-mode h1,
        body.zhuyin-mode button {
            line-height: 1.8 !important;
        }
        #att-panel.hidden {
            display: none !important;
        }
        #checkbox-container {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0.5rem;
        }
        @media (max-width: 640px) {
            #checkbox-container {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
        .seat-number {
            cursor: grab;
            transition: all 0.2s ease;
            touch-action: none; /* Prevents default touch actions */
            user-select: none; /* Prevents text selection during drag */
            aspect-ratio: 1 / 1 !important;
            font-size: 1.5rem !important; /* 加大字型 */
        }
        .seat-number:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .seat-number:active {
            cursor: grabbing;
        }
        .drop-zone {
            display: grid !important;
            grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
            gap: 0.5rem !important;
            align-content: start !important;
        }
        .column {
            flex: 1 1 240px;
            min-width: 250px;
            max-width: 340px;
            min-height: 500px;
            transition: all 0.3s ease;
        }
        /* 自訂滾動條 */
        #columns-container::-webkit-scrollbar {
            height: 8px;
        }
        #columns-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        #columns-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        #columns-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .task-input {
            border-bottom: 2px solid #4a5568;
            transition: all 0.3s ease;
            min-width: 0;
            width: 100%;
        }
        .task-input:focus {
            border-bottom: 2px solid #3182ce;
            outline: none;
        }
        .footer {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }
        .dragging {
            opacity: 0.5;
            transform: scale(1.05);
        }
        @media (max-width: 768px) {
            .column {
                min-height: 300px;

        }

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-4 text-indigo-700">過關任務</h1>
        
        <!-- Firebase Sync Control Panel -->

            </div>
            <div>
                <button id="sync-login-btn" onclick="handleSyncLogin()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded text-xs transition-colors flex items-center gap-1 shadow-sm">🔓 登入 Google 同步</button>
            </div>
        </div>
        
        <!-- Horizontal Scroll Controls & Columns Container Wrapper -->
        <div class="relative w-full mb-6">
            <!-- Left/Right Scroll Buttons for Desktop/Big Screen -->
            <button id="scroll-left-btn" class="absolute -left-6 top-1/2 -translate-y-1/2 z-10 bg-white hover:bg-slate-100 text-indigo-700 w-10 h-10 rounded-full shadow-md flex items-center justify-center border border-indigo-200 transition-all font-black text-lg select-none hover:scale-105 active:scale-95" onclick="scrollColumns(-1)">◀</button>
            <button id="scroll-right-btn" class="absolute -right-6 top-1/2 -translate-y-1/2 z-10 bg-white hover:bg-slate-100 text-indigo-700 w-10 h-10 rounded-full shadow-md flex items-center justify-center border border-indigo-200 transition-all font-black text-lg select-none hover:scale-105 active:scale-95" onclick="scrollColumns(1)">▶</button>

            <!-- Columns Container -->
            <div id="columns-container" class="flex flex-row overflow-x-auto gap-4 pb-4 scroll-smooth min-h-[480px] px-1">

        <div class="mt-8 text-center">

            <div class="flex flex-wrap justify-center gap-4">
                <button id="zhuyin-btn" onclick="toggleZhuyinMode()" class="bg-teal-600 text-white px-6 py-2 rounded-md hover:bg-teal-700 transition-colors font-semibold">🍬 注音模式 (關)</button>
                <button id="att-btn" onclick="toggleSettingsPanel()" class="bg-slate-600 text-white px-6 py-2 rounded-md hover:bg-slate-700 transition-colors font-semibold">⚙️ 設定與範本管理</button>
                <button id="reset-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition-colors font-semibold">重置座號位置</button>

            <p class="text-sm text-gray-500 mb-4">未勾選的學生座號將會自動隱藏，重置位置時亦會被排除。請假及轉出空號設定會自動儲存。</p>
            <div id="checkbox-container">

            </div>
            <div class="mt-4 flex justify-end gap-2">
                <button id="select-all-btn" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded transition-colors">全選</button>

            <div class="mt-6 flex justify-end">

    <script>
        const safeStorage = {
            getItem(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.warn('localStorage read blocked:', e);
                    return null;
                }
            },
            setItem(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.warn('localStorage write blocked:', e);
                }
            }
        };

        let activeSeats = Array(28).fill(true);
        try {
            const stored = safeStorage.getItem('active_seats');
            if (stored) {
                activeSeats = JSON.parse(stored);
            }
        } catch (e) {
            console.error("Failed to parse active_seats JSON:", e);
        }
        if (!activeSeats || activeSeats.length !== 28) {
            activeSeats = Array(28).fill(true);
        }

        const seatElements = {};
        const deviceId = Math.random().toString(36).substring(2, 10);
        let isIncomingCloudUpdate = false;

        let auth = null;
        let db = null;
        let provider = null;
        let currentUser = null;
        let firestoreUnsubscribe = null;
        let cloudWriteTimer = null;

        let columnsData = ["聯絡簿", "第一本訂正", "背書", "打掃"]; // 預設任務
        let seatPositions = {}; // 鍵：座號，值：關卡索引

        function serializeBoardState() {
            // 從 DOM 讀取最新的座號位置
            for (let i = 1; i <= 28; i++) {
                const el = seatElements[i];
                if (el && el.parentElement) {
                    const areaId = el.parentElement.id;
                    if (areaId && areaId.startsWith('drop-area-')) {
                        seatPositions[i] = parseInt(areaId.replace('drop-area-', ''));
                    } else {
                        seatPositions[i] = 0; // 預設在起點
                    }
                }
            }

            // 從 DOM 讀取最新的任務名稱
            columnsData = [];
            const inputs = document.querySelectorAll('.task-input');
            inputs.forEach((input, idx) => {
                columnsData.push(input.value.trim() || `任務 ${idx + 1}`);
            });

            const zhuyinMode = document.body.classList.contains('zhuyin-mode');

            // 讀取範本以供雲端同步
            let templates = {};
            try {
                const stored = safeStorage.getItem('breakthrough_templates');
                if (stored) templates = JSON.parse(stored);
            } catch (e) {
                console.error(e);
            }

            return {
                seatPositions,
                taskNames: columnsData,
                activeSeats,
                zhuyinMode,
                templates
            };
        }

        function applyBoardState(state) {
            if (!state) return;
            isIncomingCloudUpdate = true;
            console.log('Applying cloud state to UI:', state);
            try {
                // 1. 套用注音模式
                const body = document.body;
                const btn = document.getElementById('zhuyin-btn');
                if (state.zhuyinMode !== body.classList.contains('zhuyin-mode')) {
                    if (state.zhuyinMode) {
                        body.classList.add('zhuyin-mode');
                        if (btn) btn.textContent = '🍬 注音模式 (開)';
                    } else {
                        body.classList.remove('zhuyin-mode');
                        if (btn) btn.textContent = '🍬 注音模式 (關)';
                    }
                }

                // 2. 套用範本資料
                if (state.templates) {
                    safeStorage.setItem('breakthrough_templates', JSON.stringify(state.templates));
                    renderTemplatesList();
                }

                // 3. 套用任務名稱 (columnsData)
                if (state.taskNames && Array.isArray(state.taskNames)) {
                    columnsData = [...state.taskNames];
                }

                // 4. 套用學生出缺席 (activeSeats)
                if (state.activeSeats && Array.isArray(state.activeSeats)) {
                    state.activeSeats.forEach((checked, idx) => {
                        activeSeats[idx] = checked;
                        const seatNum = idx + 1;
                        const seatEl = seatElements[seatNum];
                        if (seatEl) {
                            seatEl.style.display = checked ? 'flex' : 'none';
                        }
                        const cb = document.querySelector(`input[data-seat-index="${idx}"]`);
                        if (cb) cb.checked = checked;
                    });
                }

                // 5. 套用座號位置
                if (state.seatPositions) {
                    // 相容舊版以 1-4 表示位置的資料 (自動轉為 0-3)
                    let isOldFormat = false;
                    for (let seatNum in state.seatPositions) {
                        if (state.seatPositions[seatNum] === 4) {
                            isOldFormat = true;
                            break;
                        }
                    }

                    for (let seatNum = 1; seatNum <= 28; seatNum++) {
                        let targetCol = state.seatPositions[seatNum];
                        if (targetCol !== undefined) {
                            if (isOldFormat) {
                                targetCol = 4 - targetCol; // 4->0, 3->1, 2->2, 1->3
                            }
                            // 限制在有效欄位範圍內
                            if (targetCol < 0) targetCol = 0;
                            if (targetCol >= columnsData.length) targetCol = columnsData.length - 1;
                            
                            seatPositions[seatNum] = targetCol;
                        } else {
                            seatPositions[seatNum] = 0;
                        }
                    }
                }

                // 重新動態生成關卡與擺放卡牌
                renderColumns();
            } catch (e) {
                console.error('Error applying cloud state:', e);
            } finally {
                isIncomingCloudUpdate = false;
            }
        }

        function triggerCloudSave() {
            safeStorage.setItem('active_seats', JSON.stringify(activeSeats));
            const zhuyinActive = document.body.classList.contains('zhuyin-mode');
            safeStorage.setItem('zhuyin_mode', zhuyinActive);

            const state = serializeBoardState();
            safeStorage.setItem('breakthrough_tasks', JSON.stringify(state.taskNames));
            safeStorage.setItem('breakthrough_seats', JSON.stringify(state.seatPositions));

            if (auth && currentUser && db && !isIncomingCloudUpdate) {
                if (cloudWriteTimer) clearTimeout(cloudWriteTimer);
                setCloudSyncText('同步中...', 'bg-yellow-500');
                cloudWriteTimer = setTimeout(async () => {
                    try {
                        const payload = {
                            ...state,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            lastUpdatedBy: deviceId
                        };
                        console.log('Writing state to cloud:', payload);
                        await db.collection('class-pet-pro-users').doc(currentUser.uid).collection('tools').doc('breakthrough').set(payload, { merge: true });
                        setCloudSyncText(`雲端已同步：${new Date().toLocaleTimeString('zh-TW')}`, 'bg-green-500');
                    } catch (e) {
                        console.error('Firestore save failed:', e);
                        setCloudSyncText('⚠️ 同步失敗', 'bg-red-500');
                    }
                }, 500);
            }
        }

        function startFirestoreListener(uid) {
            stopFirestoreListener();
            console.log('Starting Firestore listener for user:', uid, 'with deviceId:', deviceId);
            firestoreUnsubscribe = db.collection('class-pet-pro-users').doc(uid).collection('tools').doc('breakthrough')
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        console.log('Received cloud update:', data);
                        if (data.lastUpdatedBy === deviceId) {
                            console.log('Ignored update from self');
                            return;
                        }
                        applyBoardState(data);
                    } else {
                        console.log('No cloud doc found, initializing cloud state.');
                        triggerCloudSave();
                    }
                }, (error) => {
                    console.error('Firestore listener error:', error);
                    setCloudSyncText('⚠️ 雲端連線失敗，請檢查權限', 'bg-red-500');
                });
        }

        function stopFirestoreListener() {
            if (firestoreUnsubscribe) {
                firestoreUnsubscribe();
                firestoreUnsubscribe = null;
            }
        }

        function handleSyncLogin() {
            if (auth && provider) {
                setCloudSyncText('嘗試登入中...', 'bg-yellow-500');

        function moveAllSeats(fromCol, toCol) {
            const fromArea = document.getElementById('drop-area-' + fromCol);
            const toArea = document.getElementById('drop-area-' + toCol);
            if (fromArea && toArea) {
                const seats = fromArea.querySelectorAll('.seat-number');
                seats.forEach(seat => {
                    toArea.appendChild(seat);
                    const seatNum = parseInt(seat.dataset.seatNumber);
                    seatPositions[seatNum] = toCol;
                    seat.classList.add('scale-110');
                    setTimeout(() => {
                        seat.classList.remove('scale-110');
                    }, 300);
                });
                triggerCloudSave();

        // --- 任務關卡增刪與渲染邏輯 ---
        function addColumn() {
            if (columnsData.length >= 10) {
                alert('任務關卡最多支援 10 個！');
                return;
            }
            const newName = `任務 ${columnsData.length + 1}`;
            columnsData.push(newName);
            renderColumns();
            triggerCloudSave();
            
            // 捲動至最右端顯示新關卡
            setTimeout(() => {
                const container = document.getElementById('columns-container');
                if (container) {
                    container.scrollLeft = container.scrollWidth;
                }
            }, 100);
        }

        function deleteColumn(idx) {
            if (columnsData.length <= 2) {
                alert('最少必須保留 2 個關卡！');
                return;
            }
            
            const seatsInCol = [];
            for (let seatNum = 1; seatNum <= 28; seatNum++) {
                if (seatPositions[seatNum] === idx) {
                    seatsInCol.push(seatNum);
                }
            }
            
            const name = columnsData[idx];
            if (seatsInCol.length > 0) {
                if (!confirm(`關卡「${name}」中還有學生座號（${seatsInCol.join(', ')} 號）。\n刪除後，這些學生會自動退回第一關起點。\n\n確定要刪除嗎？`)) {
                    return;
                }
            }
            
            // 自 columnsData 刪除
            columnsData.splice(idx, 1);
            
            // 調整 seatPositions
            for (let seatNum = 1; seatNum <= 28; seatNum++) {
                const col = seatPositions[seatNum];
                if (col === idx) {
                    seatPositions[seatNum] = 0;
                } else if (col > idx) {
                    seatPositions[seatNum] = col - 1;
                }
            }
            
            renderColumns();
            triggerCloudSave();
        }

        function renderColumns() {
            const container = document.getElementById('columns-container');
            if (!container) return;

            const existingCols = container.querySelectorAll('.column-wrapper');
            const needsRebuild = existingCols.length !== columnsData.length;

            const activeElementId = document.activeElement ? document.activeElement.id : null;
            const activeSelectionStart = document.activeElement ? document.activeElement.selectionStart : null;
            const activeSelectionEnd = document.activeElement ? document.activeElement.selectionEnd : null;

            if (needsRebuild) {
                container.innerHTML = '';
                const colors = ['border-green-500', 'border-blue-500', 'border-yellow-500', 'border-red-500', 'border-purple-500', 'border-pink-500', 'border-teal-500'];
                
                columnsData.forEach((name, i) => {
                    const borderClass = colors[i % colors.length];
                    const colWrapper = document.createElement('div');
                    colWrapper.className = 'column-wrapper column bg-white rounded-lg shadow-md p-4 border-t-4 ' + borderClass;
                    colWrapper.id = 'column-wrapper-' + i;
                    
                    const header = document.createElement('div');
                    header.className = 'flex items-center justify-between mb-4 gap-2';
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = 'task-input-' + i;
                    input.dataset.colIndex = i;
                    input.className = 'task-input flex-1 p-2 text-lg font-semibold bg-transparent';
                    input.value = name;
                    input.placeholder = `輸入第 ${i + 1} 關任務名稱...`;
                    
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') input.blur();
                    });
                    input.addEventListener('blur', function() {
                        columnsData[i] = input.value.trim() || `任務 ${i + 1}`;
                        triggerCloudSave();
                    });
                    header.appendChild(input);
                    
                    if (i < columnsData.length - 1) {
                        const moveBtn = document.createElement('button');
                        moveBtn.className = 'bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded border border-indigo-200 transition-colors whitespace-nowrap';
                        moveBtn.textContent = '➡️ 全移';
                        moveBtn.title = '將此區所有學生移至下一關';
                        moveBtn.onclick = () => moveAllSeats(i, i + 1);
                        header.appendChild(moveBtn);
                    } else {
                        const spacer = document.createElement('div');
                        spacer.className = 'w-12 h-6';
                        header.appendChild(spacer);
                    }
                    
                    if (columnsData.length > 2) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'text-gray-400 hover:text-red-600 font-bold px-1 text-sm transition-colors';
                        delBtn.innerHTML = '&#x2715;';
                        delBtn.title = '刪除此任務';
                        delBtn.onclick = () => deleteColumn(i);
                        header.appendChild(delBtn);
                    }
                    
                    colWrapper.appendChild(header);
                    
                    const dropZone = document.createElement('div');
                    dropZone.id = 'drop-area-' + i;
                    dropZone.className = 'min-h-[400px] drop-zone';
                    
                    dropZone.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        dropZone.classList.add('bg-gray-100');
                    });
                    dropZone.addEventListener('dragleave', () => {
                        dropZone.classList.remove('bg-gray-100');
                    });
                    dropZone.addEventListener('drop', (e) => {
                        e.preventDefault();
                        dropZone.classList.remove('bg-gray-100');
                        if (draggedItem) {
                            dropZone.appendChild(draggedItem);
                            const seatNum = parseInt(draggedItem.dataset.seatNumber);
                            seatPositions[seatNum] = i;
                            draggedItem.classList.add('scale-110');
                            setTimeout(() => { draggedItem.classList.remove('scale-110'); }, 300);
                            triggerCloudSave();
                        }
                    });
                    
                    colWrapper.appendChild(dropZone);
                    container.appendChild(colWrapper);
                });
            } else {
                columnsData.forEach((name, i) => {
                    const input = document.getElementById('task-input-' + i);
                    if (input && input.value !== name) {
                        input.value = name;
                    }
                });
            }

            // 重新放置卡牌
            for (let seatNum = 1; seatNum <= 28; seatNum++) {
                const seatEl = seatElements[seatNum];
                if (seatEl) {
                    const targetCol = seatPositions[seatNum] !== undefined ? seatPositions[seatNum] : 0;
                    const zone = document.getElementById('drop-area-' + targetCol);
                    if (zone && seatEl.parentElement !== zone) {
                        zone.appendChild(seatEl);
                    }
                }
            }

            // 更新捲動按鈕可見度與對齊
            updateScrollButtonsVisibility();

            if (activeElementId) {
                const el = document.getElementById(activeElementId);
                if (el) {
                    el.focus();
                    if (activeSelectionStart !== null) {
                        try {
                            el.setSelectionRange(activeSelectionStart, activeSelectionEnd);
                        } catch(e) {}
                    }
                }
            }
        }

        function updateScrollButtonsVisibility() {
            setTimeout(() => {
                const container = document.getElementById('columns-container');
                const leftBtn = document.getElementById('scroll-left-btn');
                const rightBtn = document.getElementById('scroll-right-btn');
                if (container && leftBtn && rightBtn) {

            }, 50);
        }
        
        window.addEventListener('resize', updateScrollButtonsVisibility);

        function loadTemplate(name) {
            let templates = {};
            try {
                const stored = safeStorage.getItem('breakthrough_templates');
                if (stored) templates = JSON.parse(stored);
            } catch (e) {
                console.error(e);
            }

                            seatPositions[seatNum] = 0; // 超出範圍則退回起點
                        }
                    }
                    
                    renderColumns();
                    triggerCloudSave();
                }
            }
        }

        function deleteTemplate(name, event) {
            event.stopPropagation();
            if (confirm(`確定要刪除範本「${name}」嗎？`)) {
                let templates = {};

                    const stored = safeStorage.getItem('breakthrough_templates');
                    if (stored) templates = JSON.parse(stored);
                } catch (e) {
                    console.error(e);

                delete templates[name];
                safeStorage.setItem('breakthrough_templates', JSON.stringify(templates));
                renderTemplatesList();
                triggerCloudSave();
            }

        function initApp() {
            const resetBtn = document.getElementById('reset-btn');
            const selectAllBtn = document.getElementById('select-all-btn');
            const clearAllBtn = document.getElementById('clear-all-btn');
            const checkboxContainer = document.getElementById('checkbox-container');
            const zhuyinBtn = document.getElementById('zhuyin-btn');

            let draggedItem = null;
            let touchItem = null;

            // --- 一鍵切換注音初始化 ---
            if (zhuyinBtn) {
                let isZhuyinMode = safeStorage.getItem('zhuyin_mode') === 'true';
                if (isZhuyinMode) {
                    document.body.classList.add('zhuyin-mode');
                    zhuyinBtn.textContent = '🍬 注音模式 (開)';
                } else {
                    document.body.classList.remove('zhuyin-mode');
                    zhuyinBtn.textContent = '🍬 注音模式 (關)';
                }
            }

            // --- 還原任務名稱 & 關卡數 ---
            try {
                const storedTasks = safeStorage.getItem('breakthrough_tasks');
                if (storedTasks) {
                    columnsData = JSON.parse(storedTasks);
                }
            } catch (e) {
                console.error("Failed to restore task names:", e);
            }

            // --- 還原座號位置 ---
            try {
                const raw = safeStorage.getItem('breakthrough_seats');
                if (raw) {
                    seatPositions = JSON.parse(raw);
                }
            } catch (e) {
                console.error("Failed to parse breakthrough_seats:", e);
            }

            // 確保所有座號都有預設位置（第 0 關）
            for (let i = 1; i <= 28; i++) {
                if (seatPositions[i] === undefined) {
                    seatPositions[i] = 0;
                }
            }

            // --- 創建 28 個座號卡牌 ---
            for (let i = 1; i <= 28; i++) {
                const seatNumber = document.createElement('div');
                seatNumber.className = 'seat-number w-full aspect-square bg-indigo-100 rounded-lg flex items-center justify-center font-black text-indigo-800 shadow-md';
                seatNumber.textContent = i;
                seatNumber.draggable = true;
                seatNumber.dataset.seatNumber = i;
                
                seatElements[i] = seatNumber;
                
                // 根據出席狀態決定初始顯示
                if (!activeSeats[i - 1]) {
                    seatNumber.style.display = 'none';
                }
                
                // 滑鼠拖曳事件
                seatNumber.addEventListener('dragstart', function(e) {
                    draggedItem = seatNumber;
                    setTimeout(() => {
                        seatNumber.classList.add('opacity-50');
                    }, 0);
                });
                
                seatNumber.addEventListener('dragend', function() {
                    seatNumber.classList.remove('opacity-50');
                    draggedItem = null;
                });
                
                // 觸控事件處理
                seatNumber.addEventListener('touchstart', handleTouchStart, { passive: false });
                seatNumber.addEventListener('touchmove', handleTouchMove, { passive: false });
                seatNumber.addEventListener('touchend', handleTouchEnd, { passive: false });
            }

            // --- 動態渲染任務關卡 ---
            renderColumns();

            // --- 渲染範本列表 ---
            renderTemplatesList();

            // 觸控事件函數 (使用 function 聲明確保正確 hoisted)
            function handleTouchStart(e) {
                e.preventDefault();
                touchItem = this;
                this.classList.add('dragging');
                
                const touch = e.touches[0];
                this.initialX = touch.clientX;
                this.initialY = touch.clientY;
                
                const rect = this.getBoundingClientRect();
                this.offsetX = this.initialX - rect.left;
                this.offsetY = this.initialY - rect.top;
                
                this.style.position = 'fixed';
                this.style.zIndex = 1000;
                this.style.top = `${rect.top}px`;
                this.style.left = `${rect.left}px`;
            }
            
            function handleTouchMove(e) {
                e.preventDefault();
                if (!touchItem) return;
                
                const touch = e.touches[0];
                const x = touch.clientX - this.offsetX;
                const y = touch.clientY - this.offsetY;
                
                touchItem.style.left = `${x}px`;
                touchItem.style.top = `${y}px`;
            }
            
            function handleTouchEnd(e) {
                e.preventDefault();
                if (!touchItem) return;
                
                const touch = e.changedTouches[0];
                const x = touch.clientX;
                const y = touch.clientY;
                let targetZone = null;
                let targetColIdx = -1;
                
                // 尋找接觸到的 Drop Zone
                columnsData.forEach((_, i) => {
                    const zone = document.getElementById('drop-area-' + i);
                    if (zone) {
                        const rect = zone.getBoundingClientRect();
                        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                            targetZone = zone;
                            targetColIdx = i;
                        }
                    }
                });
                
                touchItem.style.position = '';
                touchItem.style.zIndex = '';
                touchItem.style.top = '';
                touchItem.style.left = '';
                touchItem.classList.remove('dragging');
                
                if (targetZone && targetColIdx !== -1) {
                    targetZone.appendChild(touchItem);
                    const seatNum = parseInt(touchItem.dataset.seatNumber);
                    seatPositions[seatNum] = targetColIdx;
                    touchItem.classList.add('scale-110');
                    setTimeout(() => {
                        touchItem.classList.remove('scale-110');
                    }, 300);
                    triggerCloudSave();
                }
                
                touchItem = null;
            }

            // 動態生成出缺席核取方塊
            if (checkboxContainer) {
                for (let i = 1; i <= 28; i++) {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-1 p-1 border border-gray-200 rounded hover:bg-gray-50 cursor-pointer text-sm font-semibold select-none';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'w-4 h-4 text-indigo-600 rounded';
                    checkbox.checked = activeSeats[i - 1];
                    checkbox.dataset.seatIndex = i - 1;
                    
                    const text = document.createTextNode(i + '號');
                    
                    label.appendChild(checkbox);
                    label.appendChild(text);
                    checkboxContainer.appendChild(label);
                    
                    checkbox.addEventListener('change', function() {
                        const idx = parseInt(this.dataset.seatIndex);
                        activeSeats[idx] = this.checked;
                        const seatEl = seatElements[idx + 1];
                        if (seatEl) {
                            seatEl.style.display = this.checked ? 'flex' : 'none';
                        }
                        triggerCloudSave();
                    });
                }
            }

            // 全選
            if (selectAllBtn && checkboxContainer) {
                selectAllBtn.addEventListener('click', function() {
                    const checkboxes = checkboxContainer.querySelectorAll('input[type="checkbox"]');
                    checkboxes.forEach(cb => {
                        cb.checked = true;
                        const idx = parseInt(cb.dataset.seatIndex);
                        activeSeats[idx] = true;
                        const seatEl = seatElements[idx + 1];
                        if (seatEl) seatEl.style.display = 'flex';
                    });
                    triggerCloudSave();
                });
            }

            // 全不選
            if (clearAllBtn && checkboxContainer) {
                clearAllBtn.addEventListener('click', function() {
                    const checkboxes = checkboxContainer.querySelectorAll('input[type="checkbox"]');
                    checkboxes.forEach(cb => {
                        cb.checked = false;
                        const idx = parseInt(cb.dataset.seatIndex);
                        activeSeats[idx] = false;
                        const seatEl = seatElements[idx + 1];
                        if (seatEl) seatEl.style.display = 'none';
                    });
                    triggerCloudSave();
                });
            }
            
            // 重置按鈕功能
            if (resetBtn) {
                resetBtn.addEventListener('click', function() {
                    if (confirm('確定要將所有座號位置重置回第一關起點嗎？')) {
                        for (let seatNum = 1; seatNum <= 28; seatNum++) {
                            seatPositions[seatNum] = 0;
                        }
                        renderColumns();
                        triggerCloudSave();
                    }
                });
            }

            // 初始化 Firebase 同步
            initFirebaseSync();
        }

        document.addEventListener('DOMContentLoaded', runInit);
        if (document.readyState !== 'loading') {
            runInit();
        }

        let hasInitRun = false;
        function runInit() {
            if (hasInitRun) return;
            hasInitRun = true;
            try {
                initApp();
            } catch (error) {
                console.error("App initialization failed:", error);
                showCrashAlert(error);
            }
        }

        function showCrashAlert(error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.bottom = '20px';
            errorDiv.style.left = '20px';
            errorDiv.style.right = '20px';
            errorDiv.style.backgroundColor = '#fee2e2';
            errorDiv.style.border = '2px solid #ef4444';
            errorDiv.style.borderRadius = '8px';
            errorDiv.style.padding = '16px';
            errorDiv.style.zIndex = '9999';
            errorDiv.style.color = '#991b1b';
            errorDiv.style.fontFamily = 'sans-serif';
            errorDiv.style.boxShadow = '0 10px 15px -3px rgba(0,0,0,0.1)';
            errorDiv.innerHTML = `
                <h4 style="margin: 0 0 8px 0; font-weight: bold; font-size: 16px;">⚠️ 網頁初始化錯誤</h4>
                <pre style="margin: 0; white-space: pre-wrap; font-size: 12px; font-family: monospace;">${error.stack || error.message}</pre>
                <button onclick="this.parentElement.remove()" style="margin-top: 12px; background-color: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">關閉提示</button>
            `;
            document.body.appendChild(errorDiv);
        }
    </script>

</body></html>
