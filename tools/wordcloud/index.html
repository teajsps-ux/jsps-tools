<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級互動文字雲 V2 - 獵魔女團安全版</title>
    <!-- 引用強大的工具 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF7; }
        .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 10px; }
        canvas { width: 100% !important; height: 100% !important; transition: opacity 0.5s; }
        .loader-ring { display: inline-block; width: 40px; height: 40px; border: 4px solid #f97316; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* 安全設定遮罩樣式 */
        #setupOverlay { backdrop-filter: blur(10px); background-color: rgba(255,255,255,0.85); }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-700">

    <!-- 頂部標題列 (還原原始樣式) -->
    <header class="orange-gradient text-white shadow-xl p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-xl md:text-2xl font-black tracking-wider flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>
                    互動式文字雲 V2
                </h1>
                <div id="connStatus" class="text-[10px] mt-1 flex items-center gap-1.5 font-bold">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-white/50 animate-pulse"></span> <span id="statusText">系統初始化中...</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="clearSystemConfig()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-xl text-[10px] border border-white/20 transition">重設金鑰</button>
                <button id="qrBtn" onclick="toggleModal('qrModal', true)" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-2xl transition backdrop-blur-md flex items-center gap-2 border border-white/20 shadow-lg hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4h2v-4zM6 6h6v6H6V6zm12 0h-6v6h6V6zm-6 12H6v-6h6v6z" /></svg>
                    <span class="font-bold hidden md:inline">產生分享連結</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-8 space-y-6">
        
        <!-- 輸入卡片 (還原原始樣式) -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border-l-[12px] border-orange-500 flex flex-col md:flex-row gap-4 items-center">
            <input type="text" id="userInput" 
                class="flex-grow w-full border-2 border-gray-100 bg-gray-50 rounded-[1.5rem] px-6 py-5 focus:ring-4 focus:ring-orange-100 focus:border-orange-400 outline-none text-xl transition-all font-medium" 
                placeholder="陛下，在此輸入您的想法..." 
                onkeypress="if(event.key==='Enter')sendData()">
            <button onclick="sendData()" 
                class="w-full md:w-auto bg-orange-500 hover:bg-orange-600 text-white font-black py-5 px-12 rounded-[1.5rem] transition transform active:scale-95 shadow-lg text-lg">
                送出內容
            </button>
        </div>

        <!-- 控制列 (還原陛下最愛的按鈕組) -->
        <div class="flex flex-wrap items-center justify-between gap-4 bg-white/60 p-5 rounded-3xl shadow-sm border border-white backdrop-blur-md">
            <div class="flex items-center gap-5 w-full md:w-auto px-2">
                <label class="font-bold text-gray-400 text-sm uppercase tracking-widest">文字大小</label>
                <input type="range" id="sizeSlider" min="10" max="150" value="50" 
                    class="flex-grow md:w-64 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-orange-500" 
                    oninput="updateSizeFactor(this.value)">
                <span id="sizeValue" class="w-10 text-center font-black text-orange-500 text-xl">50</span>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="confirmClear()" class="flex-1 md:flex-none text-red-500 px-6 py-3 font-bold hover:bg-red-50 rounded-2xl transition">清空</button>
                <button onclick="refreshCloud()" class="flex-1 md:flex-none bg-gray-50 text-gray-600 px-6 py-3 font-bold rounded-2xl hover:bg-gray-100 transition">更新</button>
                <button onclick="downloadImg()" class="flex-1 md:flex-none bg-gray-800 text-white px-8 py-3 font-bold rounded-2xl hover:bg-black transition shadow-lg flex items-center justify-center gap-2">
                    存圖
                </button>
            </div>
        </div>

        <!-- 文字雲顯示區 (還原原始樣式) -->
        <div id="canvasContainer" class="relative w-full h-[550px] md:h-[650px] bg-white rounded-[3.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-[12px] border-white overflow-hidden flex items-center justify-center">
            
            <img id="bgImage" src="K-Pop-Demon-Hunters.webp"
                class="absolute inset-0 w-full h-full object-cover opacity-20 pointer-events-none"
                onerror="this.style.display='none';">
            
            <div id="loader" class="absolute inset-0 z-20 bg-white/90 flex flex-col items-center justify-center gap-5">
                <div class="loader-ring"></div>
                <p id="loaderText" class="text-orange-500 font-black animate-pulse text-xl text-center px-4">正在同步雲端資料...</p>
            </div>
            
            <canvas id="wordCloudCanvas" class="relative z-10"></canvas>
        </div>
    </main>

    <!-- 🛡️ 安全引導設定介面 (僅在未配置時顯示) -->
    <div id="setupOverlay" class="fixed inset-0 z-[200] flex items-center justify-center p-4 hidden">
        <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl max-w-2xl w-full border-t-[15px] border-orange-500 text-center">
            <h2 class="text-3xl font-black text-gray-800 mb-4">陛下，請配置金鑰</h2>
            <p class="text-gray-500 mb-6 font-medium leading-relaxed">為了防止 GitHub 偵測報警，請貼上您 Firebase 專案的 Config 代碼。代碼會安全地存在您的瀏覽器中。</p>
            <textarea id="configInput" class="w-full h-48 bg-gray-50 border-2 border-gray-100 rounded-[1.5rem] p-5 font-mono text-sm focus:border-orange-400 outline-none mb-6" placeholder="在此貼上您新專案的 { apiKey: '...' } 內容..."></textarea>
            <button onclick="saveSystemConfig()" class="w-full orange-gradient text-white font-black py-5 rounded-[1.5rem] shadow-lg text-lg active:scale-95 transition">儲存並啟動系統</button>
        </div>
    </div>

    <!-- QR Code 視窗 -->
    <div id="qrModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md hidden p-4">
        <div class="bg-white p-10 rounded-[3.5rem] max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-3xl font-black mb-2 text-gray-800">分享連結</h3>
            <p class="text-gray-400 mb-8 font-medium">掃碼後學生網頁會自動帶入加密金鑰</p>
            <div id="qrContent" class="bg-gray-50 p-6 rounded-[2.5rem] mb-8 border-4 border-dashed border-gray-100 flex flex-col items-center justify-center min-h-[260px]">
                <img id="qrImage" src="" class="w-56 h-56 hidden shadow-sm rounded-2xl">
                <div id="qrLoading" class="text-orange-500 font-bold animate-bounce">產生中...</div>
            </div>
            <button onclick="toggleModal('qrModal', false)" class="w-full bg-orange-100 text-orange-600 font-black py-5 rounded-[1.5rem] hover:bg-orange-200 transition text-lg">回到文字雲</button>
        </div>
    </div>

    <!-- 套件引用 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth;
        const COLLECTION_ID = "responses";
        let cachedWords = [];
        let sizeFactor = 50;
        let isFirstLoad = true;

        // 初始化引導
        async function boot() {
            // 優先嘗試網址參數
            const urlParams = new URLSearchParams(window.location.search);
            const encodedConfig = urlParams.get('c');
            let config;

            if (encodedConfig) {
                try {
                    config = JSON.parse(atob(encodedConfig));
                    localStorage.setItem('cloud_safe_config_v2', JSON.stringify(config));
                    window.history.replaceState({}, '', window.location.pathname);
                } catch(e) { console.error("加密金鑰讀取失敗"); }
            }

            if (!config) {
                const local = localStorage.getItem('cloud_safe_config_v2');
                if (local) config = JSON.parse(local);
            }

            // 沒金鑰，秀出大殿設定視窗
            if (!config) {
                document.getElementById('setupOverlay').classList.remove('hidden');
                document.getElementById('loader').style.display = 'none';
                return;
            }

            // 啟動 Firebase
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                document.getElementById('qrBtn').classList.remove('hidden');
                
                onAuthStateChanged(auth, async (user) => {
                    const statusText = document.getElementById('statusText');
                    const statusDot = document.getElementById('statusDot');
                    const loaderText = document.getElementById('loaderText');

                    if (user) {
                        statusText.innerText = "連線成功";
                        statusDot.className = "w-2 h-2 rounded-full bg-green-400";
                        startListening();
                    } else {
                        try {
                            await signInAnonymously(auth);
                        } catch(err) {
                            statusText.innerText = "錯誤：需啟用『匿名登入』";
                            statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                            loaderText.innerHTML = "陛下，請在 Firebase Console 中<br>啟用『匿名登入』方法！";
                        }
                    }
                });
            } catch(e) {
                alert("金鑰無效！請按『重設金鑰』重新貼上。");
                localStorage.removeItem('cloud_safe_config_v2');
                location.reload();
            }
        }

        function startListening() {
            onSnapshot(collection(db, COLLECTION_ID), (snapshot) => {
                const data = snapshot.docs.map(d => d.data().text);
                processAndDraw(data);
                if(isFirstLoad) {
                    document.getElementById('loader').style.display = 'none';
                    isFirstLoad = false;
                }
            }, (error) => {
                document.getElementById('loaderText').innerHTML = "陛下，請確認資料庫已設為『測試模式』！";
            });
        }

        function processAndDraw(rawData) {
            if (!rawData || rawData.length === 0) {
                cachedWords = [['等待大家回應...', 10]];
            } else {
                const allText = rawData.join(' ');
                const words = allText.split(/[ \n,，。！!？?、；;：「」『』（）()\-._/]+/).filter(w => w.length > 0);
                const counts = {};
                words.forEach(w => counts[w] = (counts[w] || 0) + 1);
                cachedWords = Object.entries(counts).sort((a,b) => b[1]-a[1]);
            }
            drawWordCloud();
        }

        window.drawWordCloud = function() {
            const canvas = document.getElementById('wordCloudCanvas');
            const container = document.getElementById('canvasContainer');
            if (!window.WordCloud || !canvas) return;

            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;

            const maxCount = cachedWords[0] ? cachedWords[0][1] : 1;
            const finalFactor = ((canvas.width / 14) * (sizeFactor / 50)) / maxCount;

            WordCloud(canvas, {
                list: cachedWords,
                weightFactor: (s) => Math.max(16, Math.round(s * finalFactor)),
                fontFamily: "'Noto Sans TC', sans-serif",
                fontWeight: '900',
                color: 'random-dark',
                backgroundColor: 'transparent',
                rotateRatio: 0.3,
                gridSize: 8,
                shrinkToFit: true,
                clearCanvas: true
            });
        };

        window.sendData = async function() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !db) return;
            input.value = '';
            try {
                await addDoc(collection(db, COLLECTION_ID), {
                    text: text,
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error("送出失敗"); }
        }

        window.confirmClear = async function() {
            if (!confirm("陛下，確定要清空所有資料嗎？")) return;
            const snap = await getDocs(collection(db, COLLECTION_ID));
            await Promise.all(snap.docs.map(d => deleteDoc(doc(db, COLLECTION_ID, d.id))));
        }

        window.updateSizeFactor = (v) => {
            sizeFactor = v;
            document.getElementById('sizeValue').innerText = v;
            drawWordCloud();
        }

        window.saveSystemConfig = function() {
            const raw = document.getElementById('configInput').value;
            try {
                const configStr = raw.match(/\{[\s\S]*\}/)[0];
                let cleanJson = eval("(" + configStr + ")");
                if (cleanJson.apiKey) {
                    localStorage.setItem('cloud_safe_config_v2', JSON.stringify(cleanJson));
                    location.reload();
                } else { throw new Error(); }
            } catch(e) { alert("代碼格式不對喔！"); }
        }

        window.clearSystemConfig = function() {
            if(confirm("重設金鑰將清空目前設定，確定嗎？")) {
                localStorage.removeItem('cloud_safe_config_v2');
                location.reload();
            }
        }

        window.setupQr = function() {
            const config = localStorage.getItem('cloud_safe_config_v2');
            const encoded = btoa(config);
            const shareUrl = window.location.origin + window.location.pathname + "?c=" + encoded;
            document.getElementById('qrImage').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(shareUrl);
            document.getElementById('qrImage').onload = () => {
                document.getElementById('qrImage').classList.remove('hidden');
                document.getElementById('qrLoading').classList.add('hidden');
            };
        }

        window.refreshCloud = () => drawWordCloud();
        window.addEventListener('resize', drawWordCloud);

        boot();
    </script>
    <script>
        function toggleModal(id, show) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden', !show);
            if (show && id === 'qrModal') window.setupQr();
        }

        function downloadImg() {
            const canvas = document.getElementById('wordCloudCanvas');
            const bg = document.getElementById('bgImage');
            const out = document.createElement('canvas');
            out.width = canvas.width; out.height = canvas.height;
            const ctx = out.getContext('2d');
            ctx.fillStyle = "#FDFBF7"; ctx.fillRect(0, 0, out.width, out.height);
            if (bg && bg.style.display !== 'none' && bg.complete) {
                ctx.globalAlpha = 0.2;
                try { ctx.drawImage(bg, 0, 0, out.width, out.height); } catch(e) {}
            }
            ctx.globalAlpha = 1.0; ctx.drawImage(canvas, 0, 0);
            const link = document.createElement('a');
            link.download = `文字雲-${Date.now()}.png`;
            link.href = out.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
